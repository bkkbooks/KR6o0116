body:
  text: 馬鳴菩薩造梁三藏法師譯月氏國婆首那王子譯語沙門智明雜華林釋通潤述疏大乘二字是指無名無相不滅不生靈明絶待之心體言也以此心周遍含容故曰大運載一切故曰乘若據文論義大以法言以此法具有體相用三大故乘以人言以此法是諸佛菩薩所乘故若據義論文則大乘二字人法皆通如有人發大心修大因證大果此人則為大乘人此法則名大乘法由所乘之法大故能乘之人亦稱大也起信者謂此大乘法一切衆生平等具足由無信力故不肯乘道亦不載所以長淪苦海沒溺邪河今論中發明此義欲人起正信而乘此大法也上四字是所詮論是能詮謂審明二本詳定指歸令初心人易信易入故曰論也問云初心學人信此大乘有何勝力答若正解圓明決定信入有超劫之功獲成聖之力雖居生死常入涅槃恆處塵勞不離淨界現具肉眼而開慧眼之光明匪易凡心便同佛心之知見如太子具真王之相迦陵超衆鳥之音將師子筋為琴絃餘音斷響以善見藥而治病衆患潛消若那羅箭之功勢穿鐵鼓似金剛鎚之力擬碎金山則煩惱塵勞不待斷而自滅菩提妙果勿假修而自成乃至等冤親和諍論齊凡聖泯自他一去來印同異融延促混中邊世出世法不可説不可説之力無能過者佛藏經云譬如有人嚼須彌山飛行虗空石筏渡海負四天下及須彌山蚊腳為梯登至梵宮劫盡燒時一唾劫火頓滅一吹世界頓成以藕𮈔懸須彌山手接四天下雨雖則如是亦未為難如來所説無相無為無生無滅一味大乘平等法相令人信解是則為難以發此心者能翻一切塵勞門成八萬四千三昧門故乃至云此心是大中大上中上圓中圓滿中滿真中真實中實不可思議中不可思議才肯信入如師子奮迅威猛最雄象王蹴踏勢力無等故欲入此門者非信力不能是故此論標大乘起信也歸命盡十方最勝業遍知色無礙自在救世大悲者及彼身體相法性真如海無量功德藏如實修行等為欲令衆生除疑捨邪執起大乘正信佛種不斷故將欲造論故先致敬三寶陳造論之由首四句皈命佛寶即報化佛也衆聖不能及故曰最能超一切聖故曰勝業謂三輪業用即不思議業也遍知是意業最勝色無礙自在是身業最勝救世是口業最勝如來無意以衆生之意為意故能遍知如來無身以衆生之身為身故得色無礙自在如來無語隨衆生根器説法而有語故能救世此最勝三業皆是如來同體大悲所成悉隨衆生心之所現故總曰大悲也者字結德屬人及彼下二句歸命法寶及彼者牒指報化二佛也身體相者蓋指報化二身之體相為法身即以法身為法寶所謂法性身真如體也法性者即諸法自性真如者不妄不變之稱由深廣無涯故以海喻佛之所以為佛僧之所以為僧皆藉此法故下文云一切諸佛本所乘故一切菩薩皆乘此法到如來地故無量二句是歸命僧寶謂法性海中具足無量功德入初地時得證此性從性起修行如實行名如寶修行等者等諸地也以三賢位依法熏習未證法身不名如實故有以無量功德藏一句屬上文者若據後譯云無邊德藏僧勤求正覺者則屬下句為順為欲下出造論之由由衆生不信真如是一法界大總相法門體而妄生異計又不知如來藏是善不善因而橫起邪思故論中先示正義者令其除疑也對治邪執者令其捨執也分別發趣道相者令其起信根而乘大法也有正信乘大法方能紹隆三寶慧命不絶故論曰有法心能功能起摩訶衍信根是故應説此一論綱宗也有法者即本有法若據下文雙含二義一是體本法即一體摩訶衍法常恆不變不假修成屬真如門二是自本法即自體自相自用摩訶衍法迷覺覺迷悉由熏習屬阿賴耶由諸衆生既不知真如為清淨覺又不知黎耶為迷悟關妄起邪執別生異端故論主先標有法二字為宗本次將有法於立義分中總立量云衆生心是有法顯示摩訶衍義是宗因云真如生滅互相攝故同喻如金莊嚴具又于真如門別立量云真如是有法即是一法界大總相法門體是宗因云不生不滅故同喻如虗空又於生滅門別立量云阿黎耶識是有法不生不滅與生滅和合是宗因云非一非異故同喻如微塵瓦器立此總別三比量為一論之綱要人先向己躬下頓悟真如次于生滅門中漸修漸證故摩訶衍此翻大乘以是二門皆是大根器人所修法故信者即五根之一也信有三種一信實有謂于諸法實事理中深信忍故二信有德謂于三寶真淨德中深信樂故三信有能謂于一切世出世善法深信有力能得能成起希望故有此信根方能得入昔嚴陽尊者問趙州云一物不將來時如何州云放下著陽曰一物不將來放下箇甚麼州云恁麼則擔取去陽大悟此從真如有法上起信根者羅山問岩頭云起滅不停時如何頭曰咄是誰起滅羅山大悟此從黎耶有法上起信根者故宗鏡云佛祖正宗則真唯識才有信處皆可為人如華嚴經以信為手如人有手至於寶所隨意採取若當無手空無所獲如是入佛法者有信心手隨意採取道法之寶若無信心空無所得有此利益故造此論説有五分云何為五一者因緣分因同二者立義分略標大義三者解釋分廣釋令人生解四者修行信心分依解起行五者勸修利益分辨法不修如貧人數他寶故勸因緣分出造論之所由立義分立此論之大義解釋分析立義之隱微修行信心分為信未滿者修習信心故勸修利益分勸人進修必獲利益故若當例經之三分初一是序分次三是正宗分後一是流通分也初説因緣分問曰有何因緣而造此論答曰是因緣有八種云何為八一者大事因緣總相所謂為令衆生離一切苦得究竟樂非求世間名利恭敬故造論因緣有總有別言總者統言造論之所由別者別顯此論之所為苦有三苦八苦及二死苦樂有人天二乘及寂滅樂今言離一切苦是離分段變易二死苦也今言得究竟樂是得無上菩提及大涅槃樂也二者為欲解釋如來根本之義令諸衆生正解不謬故根本有二一真如是菩提涅槃根本二無明是三細六粗根本今但言如來根本者欲人向無明根本邊入如來根本故下文云其旨趣者無非離念歸于真如是也正解即勝解于決定境印持為性不可引轉為業五別境之一也有正信可起正解故前云正信而此復言正解也有此正解則見理不謬亦能正人之謬故此當下文顯示正義對治邪執也三者為令善根成熟衆生于摩訶衍法堪任不退信故成熟者謂熟處已生生處已熟堪任者謂擔當此事永無退失故下文云所謂依不定聚衆生有熏習善根力故信業果報能起十善厭生死苦欲求無上菩提修行信心經一萬劫信心成就入正定聚畢竟不退即住如來種中名信成就此當分別發趣道相也四者為令善根微少衆生修習信心故信心雖發而現惑未除心志不定日用尋常為惑所轉未能純一故云善根微少信未滿足未能擔荷大法故令修習信心下文云若有衆生善根微少久遠已來煩惱深厚雖值于佛或起人天二乘種子設求大乘根則不定遇惡因緣即便退失墮二乘地故説修行信心分五者為示方便消惡業障善護其心遠離癡慢出邪網故雖發信心而為惡業所障魔鬼所侵若不能守護即受群邪未得謂得自生癡慢故示方便令護持信心不退失故故下文云若人雖修行信心以有重障或為魔鬼病苦所惱或為世務牽纏應當勇猛精進禮佛懺悔勸請隨喜回向菩提常不休息得免諸障善根增長故曰為示方便善護其心或修三昧為彼諸魔現形惑亂當令觀察勿墮邪網故曰遠離癡慢出邪網也此當下品修六者為示修習止觀對治凡夫二乘心過故信心雖發若無止觀對治則墮凡夫及二乘地故令修習止觀下文云若修止者對治凡夫住著世間能捨二乘怯弱之見若修觀者對治二乘不起大悲狹劣心過遠離凡夫不修善根此當中品修七者為示專念一心觀佛方便淨土生于佛前必定不退信心故此以專心念佛攝護信心令不退失也下文云衆生初學是法欲求正信其心怯弱自謂不能值佛親承供養懼謂信心難可成就意欲退者謂以念佛因緣隨順得生他方佛土以常攝護信心終無有退此當上品修已上三種皆是修習信心方便八者為示利益勸修行故有如是等因緣所以造論由勸修䇿發成前諸行故此當勸修利益分有如下結前八種為造論之由也門曰修多羅中具有此法何須重説答曰修多羅中雖有此法以衆生根行不等受解緣別領納于心生慧為解所謂如來在世衆生利根指菩薩言能説之人指如來色心業勝圓音一演指口業異類等解則不須論若如來滅後或有衆生能以自力廣聞而取解者或有衆生亦能以自力少聞而多解者或有衆生無自心力因覽教于廣論而得解者自有衆生復以廣論文多為煩心樂總持少文文約而攝多義能取解者如是此論指起信論為欲總攝如來廣大深法無邊義故應説此論已説因緣分此設難通妨也難曰如上所説八種因緣如來契經皆已道過何故復造斯論答由諸衆生根器心行利鈍不同故領受解會或經或論其緣亦別若如來在世師勝資強故圓音一演即異類衆生一觸耳根隨機解悟當爾之時既有契經又何須論若夫如來滅後説者既無圓音聽者不能等解若此契經不立大義不加詳釋恐中下之機終無解入所以契經之後復有論文是則經有經功論有論益隨時設教各有所宜非無謂也言自力廣聞而取解者是自有識見復樂廣尋經義採取多聞以資性識者自力少聞而多解者亦是自有心力欲略尋經義即知其要者無自心力因廣論得解者是水母元無眼求食須賴蝦者復以廣論為繁樂總持者是畏繁好簡欲得一而得一切者如是下正顯此論正為最後一等機設也言廣大法者是暗指真如深法者是暗指黎耶無邊義者是暗指二門之義下文云一者法二者義是也已説因緣分結也次説立義分大乘宗本摩訶衍者總説有二種云何為二一者法本論體二者義體相用此即將前有法以立摩訶衍義法謂軌則指一心言以一心為萬形軌則故義謂宗趣指三大言以一心法具有三大為宗趣故所謂能立門也昔南陽忠國師與紫璘供奉論義奉曰請師立義某甲破師曰立義竟奉曰是甚麼義師曰果然不見非公境界故知未開口時立義已竟才説有法已是葛藤遍地況復刀刀秖為婆心不覺多口所言法者不出于心謂衆生心是心則攝真如隨緣一切世間三細六粗出世間本如二覺法法身流轉于六道名曰衆生故以衆生心為有法也是心則攝一切世間出世間法者此釋心之所以名法也心之一字是包真妄言謂此心能總攝一切真如門清淨法又總攝一切生滅門中染汙法由包真包妄故總攝二門大經云心如工畫師畫出諸形像五蘊悉從生無法而不造古德云百千法門同歸方寸河沙性德總在心原是故一心能攝萬法也宗鏡問云諸佛方便教門皆依衆生根起根既不等法乃塵沙何故唯立一心以為宗旨答此一心法理事圓備是大悲父般若母法寶藏萬行原以一切法界諸佛菩薩緣覺聲聞及一切衆生皆同此心諸佛已覺衆生不知今為未知者方便直指以本具故以應得故是以若了自心頓成佛慧可謂合百川為一水摶衆香為一丸融鐶釧為一金變酥酪為一味故經云若不了自心云何知佛慧是以向外別求從他妄學者喻如鑽氷覓火壓沙出油欲求濟用徒勞功力若能諦了自心不妄外求者如從木出火從麻出油不壞正因速得成辦故立一心以為宗旨依於此心顯示摩訶衍義何以故是心真如相即示摩訶衍體當體大乘種故是心生滅因緣相能示摩訶衍自體相用故此明依一心法建立二種摩訶衍門也難云衆生心法既包真妄通染淨大乘是諸佛菩薩所乘真淨法豈諸佛菩薩所乘者亦通染妄耶答大乘雖是真淨要在衆生妄染中顯以衆生心法具有染淨二分故今立衆生心中一分常恆不變者名真如相此真如者即是大乘清淨法體又立衆生心中一分染淨因緣熏習者名生滅相此生滅者復能顯示自體自相自用故故知大乘法本非妄染今隨妄染熏習故即妄染以顯示也問何故真如門中云即示生滅門中云能示答言即示者以真如相全體即是大乘若離真如別無大乘之體故曰即示也言能示者謂此真如體中具足無邊相用此相用者不離衆生日用生滅故即在此滅邊復能顯示真如自體相用故云能示也古德云欲識諸佛師向無明心內薦取欲識萬物不凋性向萬物遷變處薦取是也問何故依真如門所趣入之摩訶衍法唯立體名依生滅門所趣入之摩訶衍法立自名答真如是泯相顯性門不與萬法為侶不與諸塵作對由無他相亦無自相以自他不立故獨示其體他者謂一切不善法自者謂一切清淨法也生滅是攬理成事門其體全依真如其相用者實由真如自體具足但是為他染法所覆不能顯示然要破他方能顯自故曰能示自體自相自用也立量可知故大經云唯心佛亦爾唯佛衆生然心佛與衆生是三無差別古德云具足凡夫法凡夫不知具足聖人法聖人不會凡夫若知即是聖人聖人若會即是凡夫正此義也問一心開真如生滅二門有何所以答一心起大乘之信二門破邪見之執約真如門信妙理決定約生滅門信業用不亡可謂理事圓融真俗無礙釋摩訶衍論云心真如門有十種名一者名為如來藏門無雜亂故二者名為不二平等門無差別故三者名為一道清淨門無異岐故四者名為不起不動門離作業故五者名為無斷無縛門無治障故六者名為無去無來門無上下故七者名為出世間門無四相故八者名為寂滅門無向往故九者名為大總相門無別相故十者名為真如門無虗偽故如是十名總攝一切諸佛法藏平等義理法門名字生滅門有十種名一者名為藏識門攝持一切染淨法故二者名為如來藏門覆藏如來法身故三者名為多相多異門染淨之法過恆沙故四者名為起動門相續作業故五者名為有斷有縛門有治障故六者名為有去有來門有上下故七者名為世間門四相俱轉故八者名為流轉還滅門具足生死涅槃故九者名為相待俱成門無自成法故十者名為生滅門表無常相故如是十名總攝一切法藏種種差別法門名字故知總立一心別含多義真如門內無自無他生滅門中有善有惡隨緣開合雖異約性一理無差如上十門義味方足又開則無量無邊之義為宗合則二門一心之法為要二門之義容萬義而不亂無邊之義同一心而混融是以開合自在立破無礙開而不繁合而不狹立而無得破而無失是為馬鳴之妙術起信之宗體也所言義者則有三種云何為三一者體大真如謂一切凡夫聖人諸法真如全遍平等不增減故二者相真如所現為相大謂如來藏具足無量性功德故三者用大根化身妙用不可思議故為用大能生一切世間五戒人天善因出世間六度梵行成佛善因善因果故以上顯用字大意一切諸佛本所乘故一切菩薩皆乘此法到如來地故已説立義分文不可不立義觀立義又不可不解釋此釋摩訶衍義也言體大者謂衆生心體與四聖六凡平等無二名曰真如此真如性遍一切處即局在衆生黎耶窟中其體未嘗不大也相大者謂衆生心具有如來智慧德相名如來藏此藏不空具攝無量性德不少剩故雖為無明業相所䨱其相未嘗不大也用大者謂衆生心具大作用隨其作用皆能出生世間出世間善因善果故雖在生死業用而用未嘗不大也然二乘凡夫具此大體背之而不知有此大相遺之而不顧有此大用棄之而不用唯諸佛乘此而坐道場唯菩薩乘此而登覺岸由此一心具是三義故立一心之義名大乘也次説解釋分解釋有三種云何為三一者顯示正義指上言義大乘法義二者對治邪執三者分別發趣道相前分略示其源此分廣疏其派故曰解釋顯示正義者是能立門對治邪執者是能破門分別發趣道相者是進修門既明邪正不涉枝岐方進修故顯示正義者依一心法有二種門云何為二一者心真如門二者心生滅門是二種門皆各總攝一切法此義云何以是二門不相離故此總釋立義分一心中真如生滅二種義也心真如門者謂本住性非染非淨非生非滅不動不轉平等一味性無差別此以清淨覺地為根本心生滅門者謂熏習性隨熏轉變成于染淨染淨雖成性恆不變只由不動能成染淨是故不動亦在動中此以發業無明為根本問此真妄二心以何為心以何為體以何為相答真如以靈知寂照為心不空無住為體實相為相妄心以六塵緣影為心無性為體思慮為相是二種門皆各總攝一切法者謂真如門攝一切世間出世間法生滅門亦攝一切世間出世間法難云真如是不變門何故攝世間法生滅是隨緣門何故亦攝出世間法答以是二門不相離故以真有不變隨緣義妄有體空成事義由真不變故妄體空為真如門由真隨緣故妄成事為生滅門以生滅即真如故經説衆生本來涅槃常寂滅相以真如即生滅故經説法身流轉于六道名曰衆生既知一心具此二門故于此中具彰二相問真如生滅各攝諸法未知攝義為同為異答生滅門中名為該攝真如門中名為融攝該攝故染淨俱有融攝故染淨俱亡俱亡故一味不分俱有故歷然差別心真如者即是一法界大總相法門體所謂心性真如法體不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本已來離言説相離名字相離心緣相畢究平等無有變異不可破壞唯是一心故名真如依義立名以一切言説假名無實但隨妄念不可得故此別釋真如常恆不變門也立量可知言此真如即是華嚴一法界大總相緣起法門體此一法門舉體全是不生滅亦舉體全作生滅故禪原集云謂一切聖凡根本悉是一法界心性覺寶光各各圓滿本不名諸佛亦不名衆生秖以此心靈妙自在不守自性隨迷悟之緣成聖凡之事故曰真如楞嚴名為性一切心圓覺名為大陀羅尼是也難云現見諸法各各差別何得却言是一法界答宗鏡云一切諸法原是一法實無二相因生妄念遂見差別且如現見青白物時物本自虗不言我青我白皆是眼識自性任運分別與同時意識計度分別為青為白以意辨為色以言説為青皆是意言自妄安置且如六塵性鈍體不自立名不自呼悉無自性皆是意言故曰萬法本間而人自閙是以有心起處萬境皆有空心起處萬境皆空空不自空因心故空有不自有因心故有既非有非空則唯識唯心若無于心萬法安寄先德亦云一切諸法本自不言色亦不言空亦不言是非垢淨但人自虗妄計著作種種解會起若干知見生若干愛畏若了諸法不自生皆從自己一念顛倒而有知心與境本不相到當處解脫當處寂滅當處道場故知一切法從本已來下口不得故離言説相安名不得故離名字相著意不得故離心緣相性各滿足故畢竟平等各住本位故無有變異本無造作故不可破壞更無二法故唯是一心即此一心是一法界故名真如以一切法唯是意言但有假名都無實義不可得故故大珠云世間一切生滅法無有一法不歸如宗鏡問云何謂真心何謂妄念答妄念者從能所生因分別起發浮根之暫用成對境之妄知若離前塵此心無體因境起照境滅照亡隨念生塵念空塵謝若將此影事而為佛事既為虗妄之因只成斷滅之果真心者湛然寂照不從境生含虗任緣未嘗作意明明不昧了了常知舒之無蹤卷之無迹如澄潭瑩野明鏡懸空萬像森羅豁然虗鑑不出不入非有非無斯則千聖冥歸萬靈交會信之者徹大道之原體之者成常住之德諸佛同證此心名成正覺亦名天真佛法性佛法身佛如如佛名雖種種總是此心之別號也言真如者亦無有相謂言説之極因言遣言此真如體無有可遣所遣者名相耳以一切法悉皆真故亦無可立以一切法皆同如故當知一切法不可説離言不可念絶慮故名為真如難云真心絶朕理出有無既曰真如豈非墮名字言説相乎答一心之門微妙難究知解罕窮分別不及名為真如不過借言遣言非謂真如實墮言説名字相也問既一切言説皆可遣而真如之名獨不可遣乎答然真如之名可遣而真如之體實不可遣以一切法皆是一真無餘剩故問既不可遣則真如之體定可立乎答亦不可立以一切法皆同一如不欠少故當知一切法取不得捨不得擬議不得近傍不得不可名目強名真如故玄沙云如如向上沒可安排恰似𦦨爐不藏蚊蚋此理本來平坦何用剗除道不強為建立乖真若到這裡纖毫不受措意則差便是千聖出頭來也安他一字不得問曰若如是義者諸衆生等云何隨順而能得入答曰若知一切法雖説無有能説可説雖念無有能念可念是名隨順若離于念名為得入難曰既真如法不落言詮不墮思惟諸衆生等如何著力方能隨順如何用心方能得入答若知一切法本不可説不可念則無處著力亦無處用心若就日用開口動舌説一切法處而反觀能説法者本無一字可説又就日用東攀西緣念一切法處而反觀能念法者本無一念可著如此著力如此用心則不隨順于物而能隨順真如矣然雖如是尚存窠臼猶未忘緣未能得入以現前猶存少物故若工夫挨拶到無可用心處一念緣起無生時便能得入渾身住在真如門中矣故宗鏡云若入此門則佛法皆平等顯現不用記一字念盡一切經不用解一法會盡無邊義不用説一字常轉正法輪不用舉一步遍參法界友何者若記得是想邊際若解得落意根中若説得是辨才門若參得墮外道地並不中自己地此中不收如手撮虗空徒勞心力所以道迎之不見其首隨之不見其後存之一一皆空亡之處處咸有第一不得于一機一境上守文作解實無定法如來可説此法門中不論此事但知自心即休不更思前慮後昔長慶初參靈雲問如何是佛法大意雲云驢事未去馬事到來師如是參究二十年坐破七個蒲團不明此事一日捲簾忽然大悟乃有頌曰也大差也大差捲起簾來見天下有人問我解何宗拈起拂子劈口打如長慶七破蒲團時便是隨順捲簾時便是得入也問云入此門時有何功德答真心自體證入之時非言所詮湛如無際之虗空瑩若圓明之淨鏡毀讚不及義理難追以功德過患二門絶對待故故經云心處無在無在之心唯是一心一心之體本來寂滅不可以有無處所窮其迹不可以識智詮量指其體唯有入者只在心知如搗萬種香為丸爇一塵而具足衆氣似入大海水中浴掬微滴而已用百川執礫而盡成真金攬草而無非妙藥空器悉盈甘露之味滿室唯聞簷蔔之香衆義同歸千途兢入若論一心性起功德無盡無邊若以有量之心讚無為之德任盡神力一毫難述以信入之人悉皆現證即凡即聖感應非虗堅信不移法空之虗聲自息明誠可驗靈潤之野焰俄消豈假神通心魔頓絶匪𠙥他術識火自消除不肖人不明斯旨復次真如者依言説分別有二種義云何為二一者如實空以能究竟顯實故二者如實不空以有自體具足無漏性功德故此釋立義分中真如相之相字以空不空是真如之相故言如實空者以如來藏空無妄染不立一法故如實不空者以如來藏萬德皆備不捨一法故所言空者從本已來一切染法不相應故謂離一切法差別之相以無虗妄心念故當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相乃至總説依一切衆生以有妄心念念分別皆不相應故説為空若離妄心實無可空故此釋真如空相也一切染法不相應者謂一切染法不與真如相應故曰空也差別相即有無一異等言説相也虗忘心即分別相也此二染法即遍計執也謂真如雖在語言分別中而真如實不與語言分別相應即語言分別未嘗染污真如也喻如太清雖為雲霧點染而太清實不與雲霧相應即雲霧點染初未嘗污太清也當知真如是離念境界不可以有無思不可以一異説若定有有無遮彼有無有俱非句今有即無何有非有今無即有何有非無故雙非亦寂若有無有二可名俱有今有即無則有外無無可與有俱今無即有則無外無有可與無俱故俱有亦不得立故古德云離言説者不可以言談離心緣者不可以心度實謂心言路絶唯證相應耳且夫言説者從覺觀生是共相和合而起分別者因意識生由計度比量而起以要言之皆由不覺名相隨生若無不覺之心一切諸法悉無自相可説故知説有是增益謗説無是減損謗説非有非無是相違謗説亦有亦無是戲論謗有無既爾一異亦然四句既離百非自遣古德云般若如大火聚四面不可入又云若有一法不名法身若無一法不名法身若剩一法不名法身若欠一法不名法身若于法法上求空便于門門中解脫故曰太末蟲處處能緣獨不能緣于火聚衆生心處處能緣獨不能緣于般若今對妄染是無故説為空非離妄心外實有可空也所言不空者已顯法體空無妄故即是真心常恆不變淨法滿足則名不空亦無有相可取以離念境界唯證相應故此釋真如不空相也如本有檀德今為慳貪本有尸德今隨五欲等是以即妄之空藏不空之萬德由妄染既除真心獨露淨法滿足故曰不空所謂垢盡明現也故經云知妄本自真見佛則清淨先德云靈光獨耀逈脫根塵體露真常不拘文字心性無染即是圓成但離妄緣即如如佛問上云真如離相一切皆空若淨法滿足亦應有相可取何得言離一切相答雖有淨法實無可取以此淨法是智色不空之性是離念境界唯親證者始得相應向人吐露不得豈分別心所可取哉故先德云𮨇此法是衆生之本原諸佛之所證超一切理離一切相不可以言語分別有無推求而得但心心相即印印相契便自證知光明受用而已故宗鏡云如群盲眼開分別照境驗其真體終不摸其爪牙見乳正色豈在談其鵠雪實見月人終不觀指親到家者自息問程唯證相應不俟言説又云但了妄念無生即是真如不動此不動外更無毫釐法可得心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿黎耶識此別釋生滅隨緣熏染門也立量可知依如來藏故有生滅心者正顯生滅妄心本無有體是依不生不滅如來藏性而起故説生滅依如來藏此即如來藏為可依生滅為能依也生滅心即指最初生相無明也不生不滅即真如也良由如來藏性實本真淨但為最初不覺忽起動心遂轉此如來藏名為識藏更無別體故楞伽云如來藏為無始虗偽惡習所熏名為藏識是也此阿黎耶識即藏識也具三藏義謂能藏所藏我愛執藏也言能藏者是能持義猶如庫藏能藏一切寶貝等物故言所藏者是所依義猶如庫藏是寶貝等物所依故執藏者堅守不捨猶如金銀庫藏為人堅守故由斯真妄非一非異和合一處則真如不獨生滅有依故能不變隨緣隨緣不變可凡可聖可智可愚為龍蛇混雜之鄉作凡聖同居之地迷者迷此悟者悟此聖從此出凡從此入是知轉愚成智革凡成聖要在此門著力打破此門便能闖入真如門矣問既一心具有真如生滅二義不相捨離何故真如門中不兼生滅生滅門中必兼真如答此有深義余嘗于此會得周易陰陽奇偶之義今借此發明乾陽為奇坤陰為偶夫乾陽者即真如光明藏也坤陰者即無明也然奇不藉偶而成奇而偶實藉奇而成偶蓋孤陽不生及其隨緣而與陰為偶則變化出而萬物生矣故乾卦內外三爻皆奇坤卦內外三爻皆偶也此真如門如乾奇此生滅門如坤偶蓋真如不待生滅成真如而生滅必待真如成生滅由真如本無生滅一隨緣與生滅為偶則三細六粗變化百出故在真如門則獨行無侶在生滅門則真妄和合故知此門為凡聖交錯之地一入真如盡成覺體矣故楞伽云如來藏者名阿賴耶而與無明七識共俱如大海水常無斷絶又密嚴經云如來清淨藏世間阿賴耶如金與指鐶展轉無差別此言賴耶體即如來藏與妄染合名阿賴耶更無別體以真如不守自性變識之時此八識體即是真如隨緣之義亦可衆生迷故成阿賴耶如來悟故成如來藏如金隨工匠緣成時轉作指鐶如指鐶隨爐火緣壞時却復為金成壞展轉但是一金更無差則問此法性宗與法相宗如何辨別答法相多説事相法性唯談理性如法相宗離八識無眼等諸識若法性宗離如來藏無八識又法性宗中以第一義心隨緣成有即為能作所有心境皆通所作以不思議熏不思議變是現識因故若法相宗第一義心但是所迷非是能作有三能變謂異熟思量及了別境識又云法相無體是法性宗法性有體是法相宗今此是約法性圓教以明正量若法相宗一向説有真有妄若破相宗一向説非真非妄皆著一邊俱可思議今不染而染則不變隨緣染而不染則隨緣不變斯乃不思議之宗趣非情識之可知然則分宗辨相事則兩分若性相相成理歸一義此識有二種義真如有二一不變義二隨緣義能攝一切法生一切法云何為二一者覺義二者不覺義前立衆生心為有法通攝二門此以阿黎耶識為有法別開覺不覺二義若在覺義邊則生一切淨法攝一切染法若在不覺義邊則生一切染法攝一切淨法故曰攝一切法生一切法也此中覺即是悟不覺即是迷以此門能成能壞故成則頓成天真之佛壞則壞滅諸功德門故永嘉云是以禪門了却心頓入無生慈忍力又曰損法財滅功德莫不由斯心意識迷悟關頭正在此處故分二義也昔有僧問雲菴禪師如何是無明住地即是諸佛不動智適有童子掃地菴喚云童子童子回首菴云此便是如來不動智又問童子如何是汝佛性童子惘然菴曰此便是住地無明故知或悟或迷不離當處所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來平等法身顯出纏相依此法身説名本覺何以故本覺義者對始覺義説以始覺者即同本覺始覺義者依本覺故而有不覺依不覺故説有始覺此釋覺義以心體離念為覺則知動念是迷以離念則遍則知動念即隔以離念為法界一相則知動念為十法界差別相以離念為如來則知動念為衆生以離念為平等則知動念為不平等以離念為法身則知動念為業識身矣是故一切衆生皆依妄念故謂之迷若了妄念無有根本非內非外亦非中間三世推求悉不可得便是智體由此智體便證如來平等法身即此法身即是衆生本來面目亦名清淨覺地亦名本覺問既曰本覺原是本有即不覺時亦未曾失何故必待親見始名本覺答此雖本有但一向為無明所覆由不知故不名本覺今以自覺聖智照破無明識得此物本來舊有不是新成故名本覺此本覺義是對始覺言也問本覺理有始覺修生此二覺心是同是異答本覺始覺本非二物由自覺智照惑無本即是智體照體無自即是證如非有智外如為智所證亦無如外智能證於如是故本覺因始覺而得名始覺因本覺而立號非有異也故大經云如因日光照還見于日輪以佛智慧光見佛所行道以依本覺而有不覺由不覺故復以聖智照破不覺而合本覺故名始覺故知始本合一名究竟覺不然但名相似隨分覺也昔忠國師問紫璘供奉云佛是何義答是覺義師曰曾迷否奉曰不曾迷師曰用覺作麼故知對迷説覺若無迷亦無覺也問始本二覺攝何等法答本覺所攝即大智慧光明義等始覺所攝即三明八解乃至十力四無畏十八不共法等又云淨法之體屬本覺淨法之用屬始覺問本覺與真如何別答本覺之名對始覺義説故在生滅門中收非真如門殆至染緣既盡始本不殊平等絶言即真如相矣此中大意明依本覺而有不覺因不覺故而成始覺如因地而倒因方故迷又因地而起因方故悟故直見者如開藏取寶剖蚌得珠光發襟懷影含法界如經頌云如人獲寶藏永離貧窮苦菩薩得佛法離垢心清淨或不悟者自生障礙又以覺心源故名究竟覺不覺心源故非究竟覺上以本始合一覺此以究竟不究竟分二覺也以登峯造極無可進步處名究竟覺以路途之樂未到家者名相似隨分總名不究竟覺心源是指心之初起説即生相無明也此義云何如凡夫人覺知前念起惡故能止後念令其不起雖復名覺即是不覺故問究竟不究竟約人約法其義云何如凡下初顯斷滅相無明即起業相是在信位非究竟覺也謂未入初信已前不信真如是安身立命處不信三寶是歸依處不知惡因不識惡果廣造惡業今既創發信心覺知前念所造惡業定招果報遂修十善能止後來惡念更不續生此當滅六粗中起業相也然但止後來惡念不生未能止其不著善相故雖名覺猶然與不覺同以未能伏惑故也如二乘觀智初發意菩薩等覺于念異念無異相以捨粗分別執著相故名相似覺二顯斷異相無明是相似覺非究竟覺也二乘觀智即人空觀也初發意即三賢位此位菩薩雖未同二乘遍證人空然於人空實得自在故與二乘同論也異相無明即六粗中執取相計名字相也謂此無明迷前染淨違順二境更起六識人我見愛執種種差別名計種種差別相故名異相今此菩薩既覺種種異名異相皆因妄念而有差別故捨此異念而令此念不作異相也以伏分別我法二執空名義自性差別能捨分別事識現行故曰粗然現行雖伏種子猶在依稀髣佛見道不真正如夢中將覺未覺朧朧名相似覺故唯識云現前立少物為是唯識性以有所得故非真住唯識如法身菩薩等覺于念住念無住相以離分別粗念相故名隨分覺三顯斷住相無明是隨分覺亦非究竟覺也住相有四由無明力不覺動相即是不動轉成能見名曰轉相由無明力依前能見不了無相遂令境界妄現名現相由無明力迷前自心所現之境妄起分別染淨之相名智相由無明力不了前所分別空無所有復更起念相續不斷名相續相此位菩薩次第覺知四種無明執著妄法故初地覺相續相二地至七地覺智相八地覺現相九地覺轉相由常覺不住故曰覺於念住念無住相前伏分別現行故曰捨此斷分別種子故曰離也以初地雖斷分別法執證一分平等法身尚有俱生法執故從二地乃至九地隨己分量分斷分證名隨分覺如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺佛果是故修多羅説若有衆生能觀無念者則為向佛智故四顯斷生相無明名究竟覺也由無明力不覺心起轉彼淨心而有其念故名生相亦名業相然此業相相見未分甚深微細唯佛能知今此菩薩學窮行滿無所事事故將往昔求正覺心至此一時放下名一念相應始覺心初起處以遠離生相無明故得瞥見父母未生已前面孔如忘忽憶如醉忽醍名曰見性成佛即證佛地無生法忍却將去後來先作主公者轉成常住真心名究竟覺故經云菩薩知終不知始如來始終皆知始謂生相終謂餘相是故下結歸無念言衆生雖未能離念但肯向日用中觀察無念者是何等物如此用心此人漸與佛智相近去佛不遠即為向佛智矣況親證無念者哉故宗鏡問云佛稱覺義覺何等法答無法之法是名真法無覺之覺是名真覺則妙性無寄天真朗然華嚴經頌云佛法不可覺了此名覺法諸佛如是修一法不可得無字寶篋經云爾時勝思惟菩薩白佛言何等一法是如來所覺善男子無有一法如來所覺善男子于法無覺是名覺法善男子一切法不生而如來證覺一切法不滅而如來證覺是以若不見一法則常見諸佛千里同風若見一法即不見諸佛對面胡越故知背心合境頓起塵勞背境合心圓照法界矣問華嚴經云初發心時便成正覺則一念相應在發心時何故此中却在最後答言最初者猶如遠行始於初步然初步之後非謂無後步也此取最後者如遠行以後步為到以因果相即同時相應故又心起者無有初相可知而言知初相者即謂無念是故一切衆生不名為覺以從本來念念相續未曾離念故説無始無明若得無念者則知心相生住異滅以無念等故而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故問心念初起之時正由不覺實無初相可知而言知初相者何也答即謂無念由無念故即知前念是生相也若以有念觀生相則生相重重又烏能知必無念而後知初相也正如翳人見空中花必無翳人方見空中花不有也故自十信以至菩薩地盡雖覺有相似隨分之不同然總墮衆生數中皆名不覺以未至離念境界未出無明窟宅故唯佛一人方得無念獨證覺性始得遍知一切衆生皆在淨覺心中亂起亂滅正如野馬塵埃狂花幻影之在太虗亂起亂滅也問何故得無念者方知衆生心指生滅其餘不知答以得無念者圓證真如平等法界大總相法門體故得一覺一切覺問必無念時始得遍知生住異滅然則始覺亦先覺滅住異而後覺生相乎答雖始覺知生住異滅實非先知滅而後知生也以四相之體皆從本覺體上一念不覺俱時而有實無自體即此四相本來平等同一覺性故知迷則俱迷覺則齊覺非謂始覺有先後也故圓覺云離幻即覺亦無漸次問前文言四相覺有先後此言四相俱時齊覺者何也答四相流轉總一夢心處夢之時謂為先後各各隨其智力淺深分分知覺至于大覺則知夢中四相唯一淨覺無有體性可辨前後故曰俱時而有皆無自立也故攝論云處夢謂經年覺乃須臾頃故時雖無量攝在一剎那一剎那即無念也楞伽云一切法不生我説剎那義以剎那流轉必無自性無自性即是無生若非無生即不流轉是故契無生者方見剎那也淨名云不生不滅是無常義楞伽云七識不流轉不受苦樂非涅槃因如來藏者受苦樂與因俱若生若滅此皆發明真心隨緣造作諸法別無體性唯是真心故知四相即是真心不覺全同本覺復次本覺隨染分別生二種相與彼本覺不相捨離云何為二一者智淨相二者不思議業相此言因本覺而隨不覺因不覺而生始覺因始覺而發用也本覺者即本有清淨覺體也染分別者即熏習染污不覺也隨者言本覺不變而能隨染緣也生二種相者謂斷染成淨顯出二相非新生也不離本覺者正顯二相在染在淨皆不離本覺也言智淨相者即始覺智隨染還淨之相也言不思議相者是始覺智還淨起用之相也智淨相者謂依法力熏習如實修行滿足方便故破和合識相滅相續心相顯現法身智淳淨故此義云何以一切心識之相皆是無明無明之相不離覺性非可壞非不可壞如大海水因風波動水相風相不相捨離而水非動性若風止滅動相則滅濕性不壞故如是衆生自性清淨心因無明風動心與無明俱無形相不相捨離而心非動性若無明滅相續則滅智性不壞故依法力熏習者謂藉真如內熏之力及法界等流教法外熏之力依此二種熏力修習資糧位中加行善根至登地已證如實理行如實行以至十地行中方便滿足方得破除心識淨智現前也和合識即黎耶也以生滅與不生滅和合故相續心即微細意識名相續相故摧碎之謂破掃蕩之謂滅此在金剛無間道時用金剛智破滅心識則平等法身從茲發現大圓鏡智亦得淳淨矣問此智既已隨染分別若心識破滅此智何故獨存答凡是心識皆是無明而無明相不離覺性則知無明實性即是佛性故不可壞以是心識屬無明故又非不可壞故涅槃經云因滅無明得涅槃燈故知無明雖滅覺性不壞如大下喻明海水喻覺性風喻無明波喻心識遷流無常水相風相不相捨離喻覺性無明和合一處俱時而轉以本覺心不自起故當資無明之力方得生起根本無明不自轉故要因真心之力方得而轉如水不自作波當因風力風不自現動相要資水方現動相故經云煩惱大海有圓滿如來宣説實相常住之理本覺性體有無明衆生起無量無邊煩惱之波風雖動而水無動相者喻無明動而覺性不動也風滅則動相滅而濕性不壞者喻無明滅而心識滅智性不滅也昔有僧問大隨云劫火洞然大千俱壞未審這箇壞不壞隨曰壞僧曰甚麼則隨他去也師曰隨他去僧問龍濟劫火洞然大千俱壞未審這箇壞不壞師曰不壞僧云為甚麼不壞師云為同大千亦是此意不思議業相者以依智淨相能作一切勝妙境界所謂無量功德之相常無斷絶隨衆生根自然相應種種而現得利益故此言轉智而現報化二身也下文云以有如是大方便智除滅無明見本法身自然而有不思議業用是也能作一切勝妙境界者下文云謂諸佛如來唯是法身智相之身第一義諦無有世諦境界離於施作是也實性論云諸佛如來身如虗空無相為諸勝智者作六根境界示現微妙色出於妙音聲令嗅佛戒香與佛妙法味使覺三昧觸令知深法性是名妙境界隨衆下謂凡夫二乘身所見者名應身三賢十地所見者名報身也復次覺體相者有四種大義與虗空等言覺體無所不遍猶如淨鏡言無所不顯此將上文真如門中二義及本覺門中二義和合一處以顯生滅門中本始二覺即真如故蓋覺體是如如理覺相是如如智故有如理如智之名法身智身之號前雖各立宗因未有喻合至此總以淨鏡為同喻以顯三支無過之宗喻義既明則知若聖若凡説同説異皆是鏡中影像故先德云若言衆生心性即諸佛心性是別教義圓教心性是一寂光無彼無此極十方三世佛及衆生邊際成一大圓鏡無有同異佛及衆生皆是鏡中影像故故曰舉一心為宗照萬法如鏡云何為四一者如實空鏡言本覺本來無妄遠離一切心境界相無法可現本覺體空無妄非覺照義故無物可照先以真如二義立比量云覺體如實是有法空為宗因云遠離一切心境故同喻如淨鏡以鏡為同喻者鏡中本無衆像故無法可現者遠離一切依他法也非覺照義者遠離一切遍計心也以依他遍計皆是鏡之塵垢非鏡之光明故正言一法不存一念不動離遍計依他是如實覺體名空如來藏圓覺云虗空性故常不動故古德云常了一切空無物當情是諸佛用心處二者因內現熏習鏡謂如實不空一切世間境界悉於中現不出本身清淨故不出不入不失不壞常住一心以一切法即真實性故又一切染法所不能染智體不動具足無漏熏衆生故量云如實覺相是有法不空為宗因云因熏習故一切世間境界悉于中現同喻如鏡以鏡為同喻者胡來現胡漢來現漢故一切世間即三世間也以三世間不出本覺清淨鏡故問若以鏡為同喻者鏡亦有因熏習乎答此中言因熏習者是覺體中本來具足大智慧光明因故能現三世間如淨鏡具足光明因方能現群像也此正顯覺性內因熏習如淨鏡光明非若黎耶有染淨新熏因也不出等者言此鏡中所現境界非從內出不從外入不因境界出而失其鏡不因境界入而併壞其鏡以此心鏡是常住故以三科七大皆實性故問衆生世間是無明染法若具足圓滿何得言覺體不染故通云一切染法所不能染以智體不動具足無漏清淨種子熏習衆生世間故得淨法滿足染法不能染也言具足者正顯不自外來也已上二義約真如門説故無修證下約生滅門説故有修證也三者法出離鏡謂不空法出煩惱礙智礙離和合相淳淨明故次以本覺二義作比量云不空法是有法淳淨明故是宗因云出離故同喻如鏡以鏡為同喻者鏡體若為塵封則無現相之用必鏡體清淨然後能現相故喻如衆生雖具大圓鏡智然為二障蒙蔽藏識蓋覆不能出離光明不發故假磨拭之功去其重垢令其明淨然後照物也煩惱礙智礙即二障也和合即阿黎耶識離和合故淳離煩惱故淨離智障故明出離三過圓滿三德名法出離四者緣熏習鏡謂依法出離故遍照衆生之心令修善根隨念示現故量云出離法是有法遍照衆生心是宗因云緣熏習故同喻如鏡以鏡為同喻者以能作增上緣遍照衆生妍醜故所言法者謂衆生心衆生之心已出二障已離和合故能作增上緣遍照衆生之心隨彼心念現身説法此即自得此鏡復將此鏡以照人也永嘉云心鏡明鑑無礙廓然瑩徹周沙界萬像森羅影現中一顆圓光非內外所謂不思議業用也釋覺義已竟所言不覺義者謂不如實知真如法一故不覺心起而有其念念無自相不離本覺猶如迷人依方故迷若離于方則無有迷衆生亦爾依覺故迷若離覺性則無不覺以有不覺妄想心故能知名義為説真覺若離不覺之心則無真覺自相可説此下釋不覺義也言不覺者即無明也是事不知號曰無明以不覺故不知有以不信故不肯承當故但起無明只成倒想如夜繩不動疑之為蛇暗室本空怖之為鬼此衆生之迷根也前以始覺契本覺名始本不二法界一相為覺此言無始覺契本覺不達法界一相故迷清淨覺體有不覺心瞥然生起遂轉此清淨覺心而成最初一念名為生相無明由此無明一迷從迷積迷空歷塵沙之劫因愛生愛永昏長夜之中然此無明無有自相不能自立皆依清淨覺體而有喻如迷人以東為西惑南為北其實西北不離東南若離東南別無西北故衆生下法合可知以有下發明覺與不覺是對待立也由對彼不覺即此如實知者名真覺也若無不覺真覺之名無處安立故圓覺云衆幻滅無處成道亦無得故知覺與不覺是兩頭語真如門中實無此事首楞嚴云妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真又云言妄顯諸真妄真同二妄故宗鏡問云不覺妄心元無自體今已覺悟妄心起時無有初相則全成真覺此真覺相為復隨妄俱遣為當始終建立答因妄説真真無自相從空起妄妄體本空妄既歸空真亦不立大智度論云若世諦有如毫釐許有實者第一義諦亦應有實故知凡立真妄皆是隨他意語化門中收若頓見性人誰論斯事洞山云這個猶不是何況張三李四真空與非空將來不相似了了如目前不容毫髮擬只如云這箇猶不是豈況諸狂機謬解所以云心不繫道亦不結業道尚不繫降茲可知復次依不覺故生三種相與彼不覺相應不離云何為三一者無明本業相末以依不覺故心動説名為業覺則不動動則有苦果不離因故二者能見相以依動故能見不動則無見三者境界相以依能見故境界六塵妄現離見則無境界前明依本覺而起不覺此明依不覺而起三細所謂無明不覺生三細也由前對真如三大後對六粗故立此三細也由無明一動迷體大而為業識迷相大而為能見迷用大而為現相也言無明業相者謂此業相從無明起名根本發業無明此中業通因果以心動是業因故曰心動説名為業以招報是業果故曰動則有苦果不離因者正言粗中業果不離最初一念業因所謂因果交徹也先德云一翳在目千花亂空一妄在心河沙生滅反顯覺心一發則不動不動則證平等法身故大經云初發心時便成正覺亦是因果交徹也二者下釋轉相也由無明覆蓋大智慧光不能遍照成能見相即根性也楞嚴指此為見精聞精等是也反顯不動時即是無見頂相三者下釋境界相也以無明力轉此第一義諦境界為世諦境界即器界也反顯無見則是第一義境界攝論云意識緣三世境及非三世境是即可知此識所緣境不可知由不可知故曰細此皆八地已上所知境界非餘所知故問此中立義與唯識宗為同為異答亦同亦異唯識宗立四分一相分二見分三自證分四證自證分此中亦立四分一真如二阿黎三見分四相分兩相符合故同然唯識以生滅業識為根本相見為依他此中以真如為根本即後二分皆屬依他故異以有境界緣故復生六種相云何為六一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂覺心起念相應不斷故三者執著取相依於相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別假名言相故五者起業相依于名字尋名取著造種種業故六者業繫苦相以依業受報不自在故當知無明能生一切染法以一切染法皆是不覺相故前以真如為因無明為緣而生三細此以無明為因境界為緣復生六粗楞伽云譬如大海水境界風所動種種諸識浪騰躍而轉生是也言智相者由無明故不了自心所現境界依于境界分別好醜初起愛憎名為智相言相續者謂依憎愛心生苦樂受覺心即覺受也由苦樂受領憎愛境念念不斷名相續相此二遍計即是六根對境而生微細意識即末那也所以祖師云不怕念起唯慮覺遲又云瞥起是病不續是藥以心生即是罪生是以初心攝念為先是入道之階梯禪原集云攝心一處便是功德叢林散慮片時即名煩惱羅剎故知不覺最初一念因成之假寧免後念相續成事之過乎言執取者謂依苦樂二受于六塵境攀緣不息苦亦不捨樂亦不離愈苦愈執愈樂愈取名執取相故經云衆生心性猶如獼猴獼猴之性捨一取一衆生心性亦復如是取著六塵無暫住時計名字者由執取故復恐於六塵境忘其相狀故於彼境安立種種名字於是計著名字分別不停永無忘失名計名字相故經云相名常相隨而生諸妄想此二遍計又從微細意識引生粗意識也此上四相皆由不達境界是自心現於境界上起憎愛生苦樂取相計名深生惑著不肯放捨此由能見為根能現為塵由此根塵生起四種惑相也下二相是造業受報也言起業相者由業習氣與二取習氣發動身口造一切業名起業相即業因也言業繫苦者既有業因遂感異熟苦果由業繫縛隨業輪轉不得自在名業繫苦此二皆從無明愛取三種煩惱生也當知下結顯無明為因生一切染法以三細六粗總屬無明不了真如而起故嗚呼至德之世耕而食織而衣同與鳥獸俱族與萬物並山無蹊隧澤無舟梁民至老死不相往來當此之際含哺而嬉果腹而遊何愛何憎何苦何樂何名字取著之有故知太古之民具有三細六粗未發爰自中古至德漸漓淳風漸喪而愛憎漸起苦樂漸生然未至於計名著相也殆至伏羲造書畫卦名相斯興雖是菩薩應時設化對病設藥自茲以降無論愚智類皆墮在名相中無以反其性情由是惑業習襲報應綸輪塵沙劫波莫之遏絶故我釋迦世尊乘悲願力現相人中直指本來清淨覺體令人反情復性得大受用逍遙乎無為之宅遊戲乎寂滅之場非三界四生同體之悲肯如是乎故知聖人出世必因其時非漫然也復次覺與不覺有二種相云何為二一者同相二者異相由前黎耶一量但立宗因未曾説喻其於三支是缺減性故立喻以足之方成真能立也立量云阿黎耶識是有法不生不滅與生滅和合是宗因云非一非異故喻如微塵瓦器言同相者即同喻也以不覺中同覺性故喻如瓦器皆同微塵也由同相顯示一切諸法唯一真如異相者異喻也由異相顯示真如作一切法謂不覺中雖同覺性因四聖六凡之相各各有異而性亦有異喻如瓦器雖同是微塵因瓦器之相各各有異而微塵亦異也又云以真如故同以無明故異又云以本有故同以新熏故異同相者譬如種種瓦器皆同微塵性相如是無漏無明種種業幻皆同真如性相是故修多羅中依於此義説一切衆生本來常住入於涅槃菩提之法非可修相非可作相畢竟無得亦無色相可見而有見色相者唯是隨染業幻所作非是智色不空之性以智相無可見故瓦器皆同微塵性相者喻無漏所發淨業與無明所發染業皆悉是幻總不離真如一法界大總相法門以真如不變隨緣成一切法故文殊師利答第一經云佛問文殊汝久遠來普遊十方剎中見何殊事答曰我久遠來不見餘事唯見微塵佛言汝百年中居於輪家不見種種瓦器相耶答我唯見塵不見瓦器佛言汝實不見地水火風山川林樹種種相耶答云我實不見相唯見微塵佛言汝實見微塵耶答云我久遠不見微塵佛言善哉汝能覺一相即是無相若仁者如是覺依一相門一切衆生本來常住等問衆生本來是佛應無衆生色相可見何故現見衆生色相答此所見者是衆生真如隨其染業幻作此相實非本具如來智身也以智身無相可見故是知一切法界衆生皆含佛智但以情塵自隔不能內照空埋金藏枉蔽靈臺如鬬沒額珠醉迷衣寶不因指示何以發明但能破塵出經恆沙佛性一時皆了是知水未入海不鹹薪未入火不燒若入此門皆同一照無一心而非佛心無一事而非佛事未見剎那頃不是如來得菩提時無有芥子許非是如來捨身命處異相者如種種瓦器各各不同如是無漏無明隨染幻差別性染幻差別故瓦器各各差別者言生佛雖同一法界以無漏所起淨業與無明所起染業各各不同故界界互別性性各異故名異相佛問舍利子汝見此土作何心見答曰我見此土山川林樹砂礫土石日月宮殿舍宅等種種相各各不同佛言汝智慧力下劣狹少心有高下見如是異等問何故聖凡皆屬生滅門收答以真如門聖凡不立故是故十方衆生全是佛體而無分劑以不知故甘稱眇劣稟如來之智德自墮愚盲具廣大之威神反跧小器所以志公云法性量同太虗衆生發心自小由斯義故方見全佛之衆生惺惺不昧全衆生之佛歷歷無疑悟本而自達家鄉得用而如親手足云何迷真抱幻捨實𠙥虗辜負己靈埋沒家寶高推上聖自鄙下凡都為但誦空文未窮實義空記即心即佛之旨親省何年高談萬法唯識之宗誰當現證既違教觀又闕明師雖曰紹隆但成自誑耳已上釋立義分中心生滅三字竟復次生滅因緣者所謂衆生依心意意識轉故此義云何以依阿賴耶識説有無明不覺而起能見能現能取境界起念相續故説為意此釋立義分中生滅之因緣也正謂清淨心本無生滅而忽起生滅恐人認為自然故説生滅皆隨因緣非自然也衆生依心意意識轉者衆生二字除佛一人其餘自凡夫以至十地菩薩悉在其中以前云一切衆生不名覺故依有能依所依所依即心意識能依即衆生也心意意識若據相宗解集起名心思量名意分別名識意謂自凡夫以至十地菩薩生滅滅生各各不同統而言之皆依心意意識而轉覺為迷亦由心意意識而轉迷為覺也如楞伽云心如工技兒意如和伎者五識為伴侶妄想觀衆伎如歌舞工伎之人隨他拍轉拍緩則步緩拍急則步急衆生亦如是意地若生身輪動作意地若息根境寂然故曰身非念輪隨念所使故知或迷或覺皆從意轉前文不立末那此中亦不明指末那據下五種俱名為意而以意識續之則末那意實通三細六粗以半分屬業識半分通意識故問衆生依心意意識而轉覺為迷此義云何答以一切衆生皆以黎耶為因無明為緣由此二種為因緣故生五種意謂不覺故心動名業識復從不覺而起能見能現能取相續名意復從此意計名著相名意識是故一切衆生皆依心意意識而轉覺為迷也問前云依無明故而有黎耶何故此中説依黎耶而有無明答有二義一由無明動彼覺心成黎耶識即此黎耶復與無明為依以不相離故二即此黎耶具覺不覺前就本覺説故曰依覺而有不覺今依不覺説故曰依黎耶而有無明也此意復有五種名云何為五一者名為業識謂無明力不覺心動故業識者謂清淨覺心本來不動因無明風鼓不覺心動遂轉此本覺真心而為業識為二障之元作二死之本故遠公云本端竟何從起滅有無際一微涉動境成此頺山勢明知三界別無理但是妄心生為八倒之根株作四流之源穴疾如掣電猛若狂風撇起塵勞速甚瀑川之水欻生五欲急過旋火之輪結搆四魔驅馳十使沉二死之河底投八苦之焰中醉迷衣裡之珠徒經艱險鬪沒額中之寶空自悲嗟皆由妄心迷此真覺若欲塞煩惱之窟穴截生死之根株但能內觀一念無生則空華三界如風卷煙幻境六塵猶湯沃雪廓然無際唯一真如矣二者名為轉識依於動心能見相故三者名為現識所謂能現一切境界猶如明鏡現於色像現識亦爾隨其五塵對至即現無有前後以一切時任運而起常在前故由依一念心動轉此大智慧光而為能見名轉識有能見故復轉第一義諦境界而為世諦境界名現識也隨其五塵對至即現者如楞嚴云汝以空明則有空現乃至色來現色聲來現聲香來現香味來現味故曰即也若據相宗解五塵即性境也現者即是現在顯現現量之境故曰即現不現過未之境故無前後任運而起常在前者是因緣變非若分別變之有生滅也此三雖屬黎耶然亦通屬末那以有賴耶必有末那故瑜伽云賴耶識起必二識相應故若據後文即此相續識名為意識有意識處必有末那以意識緣境必以末那為染淨依故但此末那行相微細故雖通意識而凡夫二乘皆所不知是入地菩薩所知境故此當相宗從自證分而生見相二分也四者名為智識謂分別染淨法故五者名為相續識以念相應不斷故不了前境從自心現本無染淨而虗妄計度是染是淨生愛生憎故名智識言智識者謂迷智體初起分別故言相續者謂既生憎愛復於染淨法中念念攀緣心心無間名相續識也此從相見二分而起法遍計也住持過去無量世等善惡之業令不失故復能成熟現在未來苦樂等報無差違故能令現在已經之事忽然而念未來之事不覺妄慮是故三界虗偽唯心所作離心則無六塵境界此義云何以一切法皆從心起妄念而生一切分別即分別自心心不見心無相可得當知世間一切境界皆依衆生無明妄心而得住持是故一切法如鏡中像無體可得唯心虗妄以心生則種種法生心滅則種種法滅故謂無明既發業已而此相續識有三種思為業用能造善惡二業種而令賴耶執持業種常不斷絶此即起業相也楞伽云心名採集業意名廣採集是也復能下謂此識既造善惡二業復能令賴耶識成熟苦樂二果亦不斷絶此即業繫苦相也能令下謂此識妄慮過現未來三世之境而令賴耶念念受熏亦不斷絶由因果受熏皆不斷絶故名相續識也下總結云是知三界虗偽皆是衆生自心所現若離自心外無片事可得當知境由心起還逐心亡但心生非境生心滅非境滅似魚母念魚子如蜂王攝衆蜂魚母不念而魚子亡蜂王不攝而衆蜂散是以有心緣境萬境摐然無念憶持纖毫不現終無心外法能與心為緣但是自心生還與心為相是以箭穿石虎非功力之所能醉告三軍豈糵之所造笋穿寒谷非陽和之所生魚躍氷池豈網羅之所致悉為心感顯此靈通故知萬法施為皆自心之力也問現見六塵森然滿目何故却説唯心答以一切法本無所有皆從最初一念心動轉心為念由此妄念生種種法復於種種法上分染分淨起愛起憎妄生苦樂殊不知總是自心取自心故知但有一法現前皆是自心分別設當一念暫起盡因幻境牽生起滅同時更無前後問既是法從心生何故開眼但能見法不見自心答心不見心以無形相可得見故故金剛經云凡所有相皆是虗妄若見諸相非相即見如來當知下總結前文無明即不覺也妄心即業識也言不但五蘊身是無明業識住持即外洎山河虗空大地皆是無明業識住持也以業識能住持三類性境故故知緣生之法皆是無常如鏡裡之形無體而全因外境似水中之月不實而虗現空輪以心下二句正言流轉還滅皆是自心更無別法由二乘凡夫不達三界唯心故詳示之復次言意識者即此相續識依諸凡夫取著轉深計我我所五蘊中妄執主宰為我種種妄執隨事攀緣分別六塵名為能依意識亦名分離識又復説名分別事識此識依貪不斷見愛所依煩惱增長義故此明從微細意識而生粗意識也言即此相續識者顯非別有即意所生也依諸凡夫者指人天乘也取著轉深者執取相也計我我所者計名字相也由此二種虗妄遍計於是見色取色聞聲取聲乃至覺觸取觸知法取法故轉此意名為意識又名分離識者以獨緣法塵故又名分別事識者以能兼緣前五塵故此識依見愛煩惱增長者即見思二惑也由此二惑故令相續益深妄執愈熾此從二種法遍計上復生二種我遍計所謂迷人者必迷法也此論以執法名意執我名意識非若識論立意意識各有我法二執也若據六粗次第此段當在起念相應不斷故之下聯絡住持等文則前後相貫讀者詳之依無明熏習所起識者非凡夫所知亦非二乘智慧所覺謂依菩薩從初正信發心觀察若證法身得少分知乃至菩薩究竟地不能盡知唯佛窮了何以故是心從本已來自性清淨而有無明為無明所染有其染心雖有染心而常恆不變是故此義唯佛能知所謂心性常無念故名為不變以不達一法界故心不相應忽然念起名為無明此下明由心意意識轉迷而為覺也問云上言一切衆生心本清淨皆依無明一動熏起覺心轉成業識即此最初無明所熏之識何人能知答凡夫在五住煩惱中住二乘雖斷四住未達無明所以凡夫二乘悉皆無分此之無明要具大乘二種性者於初信位發心觀察於資糧位修大乘順解脫分於四加行復修大乘順決擇分至通達位入初地時斷一分無明證一分法身得少分知乃至菩薩地盡不能盡知秪名分覺至佛果位方能窮了名究竟覺問何故無明必待極果然後能知答是心本來清淨毫無垢染如淨明日無所不照由於清淨覺心是初一念忽起動心轉此光明淨覺而成無明所謂不思議熏不思議變也既為無明所染即名染心不名淨覺所謂不染而染也由此最初一念微細甚深唯佛一人獨能覺了餘雖隨分實未能知故曰聲前一句千聖不傳未曾親近如隔大千問既曰染心則心已變何故又曰常恆不變答由心性本來常寂本無妄念不與染法相應故雖隨染緣實未曾變喻如風起澄潭之浪浪雖動而常居不動之源似翳生空界之華華雖現而匪離虗空之性問既曰自性清淨本無有染何故忽起無明此無明者從何所來答心性本自常恆皆由背覺合塵不與法界相應瞥起一念故轉淨覺而為無明別無所來實由不變故隨染緣也染心者有六種云何為六一者執相應染依二乘解脫及信相應地遠離故二者不斷相應染依信相應地修學方便漸漸能捨得淨心地究竟離故三者分別智相應染依具戒地漸離乃至無相方便地究竟離故問今此淨覺既為無明所染不染而染成此染心此染心復有幾種何位方斷答有六種言執相應染者即六粗中執取相及計名字相此即意識遍計執也由意識見愛煩惱所增長故二乘至無學位斷見思惑證生空理得三解脫方得遠離若菩薩從初發心觀察至七信位信根成就永無退失名信相應地然此菩薩雖未得人空由信力故見思煩惱不得現行故云遠離非約隨眠以留惑故攝論云若不斷現行則不異凡夫若不留惑種則不異二乘此約終教説若約始教初地已上方説留惑若約實教菩薩從初正信便達真如本有無明本空隨順無念於此地前能修法空真如三昧自然令彼法執不生伏於無明與真如相應即能學斷故下文云不了一法界義者從信相應地觀察學斷故不斷相應染者即六粗中第二相續相五意中相續識即分別法執也此菩薩從初資糧加行位中修唯識觀現行已伏至通達位究竟永離言淨心者由入初地斷異生性障證遍行真如故唯識頌云若時於所緣智都無所得爾時住唯識離二取相故分別智相應染者即六粗中智相五意中智識此即俱生法執也具戒地者即離垢地具淨尸羅遠離能起毀犯煩惱垢故無相方便地即第七遠行地也前之五地有相觀多無相觀少至第六地無相觀多有相觀少逮至第七地純無相觀念念正受但念空無相無作故不起分別此意俱生法執地地漸除至此地則意之遍計已空故下破依他也四者現色不相應染依色自在地能離故五者能見心不相應染依心自在地能離故六者根本業不相應染依菩薩盡地得入如來地能離故不了一法界義者從信相應地觀察學斷入淨心地隨分得離乃至如來地能究竟離故現色不相應染者此即三細中現境界相五意中現識也此境界是依根本無明一動所現微細難知至不動地已離業色任運現身現土名色自在能見心不相應染者即三細中能見相五意中轉識也此能見相亦是根本無明一動所成九地菩薩盡此業相善知衆生十種稠林以四無礙智現身説法名心自在根本業不相應染者即三細中業相五意中業識此無明業相至菩薩盡地在無間道用金剛智除滅無明入如來地得見心性名究竟覺問何故相宗但空遍計不遣依他答相宗立相故不遣依他唯空遍計性宗顯性故先除遍計亦遣依他若空遍計而不遣依他謂之半頭唯識若空遍計復遣依他方名具分唯識也不了一法界義者即最初一念生相無明名不覺相亦名根本無明此無明從三賢位學斷乃至菩薩盡地漸離至如來地方究竟離言相應義者謂心念法異依染淨差別而知相緣相同故不相應義者謂即心不覺常無別異不同知相緣相故問同一染心而有相應不相應者何故答言相應者謂此染心初起以無力故心王心所不能自生必依染淨境界方生以境有差別心心所亦異故曰知相緣相同也以二法同生名曰相應言不相應者謂無明初起以有力故不藉境生由背清淨覺不與淨覺相應突起無明即成不覺故自始至終從迷積迷曾無別異不同心境有別異故名不相應是知待生者弱突起者強在外者粗在內者細背覺者難除合塵者易遣也又染心義者名為煩惱礙能障真如根本智故無明義者名為智礙能障世間自在業智故此義云何以依染心能見能現妄取境界違平等性故以一切法常靜無有起相無明不覺妄與法違故不能得隨順世間一切境界種種知故上以無明染心分根本枝末此以染心配煩惱所知以染心為煩惱障者由彼染心昏煩惱亂障礙靜心不能契合根本如理智故根本智即智淨相也以無明為所知障者由彼無明愚癡暗昧障礙淨用不能證得自然業智故自然業即不思議業用也所以下徵釋以染心為煩惱礙者由彼染心於六根門頭見色聞聲妄生取著分染分淨生愛生憎障平等理故以染心為煩惱障也以無明為所知障者以一切法本自寂滅無有動相由無明一起妄與法違故開眼時不達性空皆成法礙故以無明為所知障也是知心外無法法外無心但了一心諸塵自寂起心背法即乖法體既與相違即不通達若能順法界性合真如心則般若無知無所不知矣已上釋生滅因緣竟復次分別生滅相者有二種云何為二一者粗與心相應故二者細與心不相應故又粗中之粗凡夫境界粗中之細及細中之粗菩薩境界細中之細是佛境界此釋立義分中生滅相之相字也因生滅之相有粗細故特明之言粗者即六染中前三染與境相應而起其相粗顯人所易了故此即相生滅也言細者即六染中後三染是背覺而突起其相微細人所難了故此即流注生滅也又粗下復詳分粗細粗中粗者謂三染心雖俱名粗就中第一執相應染為尤粗二乘三賢皆能覺察此染故以是粗意識遍計故粗中細者即前三染中後二染謂不斷相應染及分別智相應染也此於粗中稍細是初地以至七地菩薩所知故以是微細意識所遍計故細中粗者謂後三染心雖俱名細就中前二稍粗謂現色不相應染及能見心不相應染此是賴耶所緣相分及能緣見分是八地九地菩薩所知故細中之細即最後根本業不相應染以能所未分行相微細唯佛能了故古德云學道之人細識心細中之細最難尋可中尋到無尋處方信凡心即佛心正此意也此二種就粗細生滅依于無明熏習而有所謂依因依緣依因者不覺義故依緣者妄作境界義故若因滅則緣滅因滅故不相應心滅緣滅故相應心滅此明由因緣而有生滅相以見生不自生由因緣生滅不自滅由因緣滅也若統言生三細六粗皆依無明熏習而生故曰依於無明熏習而有也若別言生依無明因生三種不相應心依境界緣生三種相應心故曰依因依緣也若統言滅則無明滅時無明所起現識境界亦滅故曰若因滅則緣滅若別顯滅三細因無明生無明滅時三細亦滅三粗從境界緣生故境界滅時三粗亦滅也此約生佛始終言生滅非約剎那生滅義也問曰若心滅者云何相續若相續者云何説究竟無明滅答曰所言滅者唯心相滅滅心上生滅相非心體滅如風依水而有動相若水滅者則風相斷絶無所依止以水不滅風相相續唯風滅故動相隨滅非是水滅無明亦爾依心體而動若心體滅者則衆生斷絶無所依止以體不滅心得相續唯癡無明滅故心相隨滅非心智滅此約粗細二心滅有先後以興難也意謂境界緣滅則相應心已滅不應復有不相應心相續若謂尚有不相應心相續者即此便是不滅之相云何復説究竟滅答謂境界緣滅唯相應心粗相滅非心體滅無明滅時亦唯不相應細相滅非心體滅也如風下喻明如風依水而有動相者立喻本也若水下先喻相應心也以境滅時相應心相雖滅心體不滅以不滅故三細相續正如猛風滅故粗浪相滅非水體滅也唯風下次喻不相應心也以心非動性故無明滅而染相滅而心不滅正如微風滅故細波亦滅非水體滅也無明下法合無明依心而動合喻本也若心下合相應心滅而心體不滅也此衆生是依業轉二相之衆生也斯即八地已上菩薩皆依業轉得名以粗染滅時細染不滅故八地已上菩薩尚在生滅流注不斷未得成佛唯癡下合不相應心滅而心智不滅也以無明滅時細染方盡而如來大圓鏡智淳淨明故故曰非心智滅已上釋心相竟
