body:
  text: 馬鳴菩薩造梁三藏法師譯月氏國婆首那王子譯語沙門智明雜華林釋通潤述疏復次有四種法熏習義故染法淨法起不斷絶云何為四一者淨法名為真如生滅門中所顯之真如也二者一切染之因名為無明三者妄心名為業識四者妄境界所謂六塵此下廣明生滅門覺不覺義皆由染淨二種因緣熏習而成也先標四法為能熏所熏之張本生滅中所具淨法名為真如者即十地所證皆以真如為因也一切染因為無明者謂九相五意六染皆依無明為因也妄心雖名業識實通事識今據本故但言業識六塵是事識所緣之境問染淨二法應敵體相翻何故淨法唯一而染法有三答一炬之火能燒衆薪故熏習義者如世間衣服實無於香此香依染淨而言若人以香而熏習故則有香氣此亦如是真如淨法實無於染但以無明而熏習故則有染相無明染法實無淨業自己本假焉有淨業但以真如而熏習故則有淨用此釋熏習二字先喻明此亦下法合真如實無染相隨染熏而現幻相無明實無淨用隨淨熏而成實用故染法熏真如但云染相而不言用真如熏染法但云淨用而不言相以相虗而用實故經云如來藏為惡習所熏名為藏識此言染法熏淨法也又云由如來藏故能厭生死樂涅槃此名淨法熏染法也溈山云此性本來清淨具生萬物但以染淨二緣而有差別故諸佛悟之一向淨用而成覺道凡夫迷之一向染用沒溺輪回其體不二故般若云無二無二分無別無斷故喻如一水若珠入則清塵雜則穢又如一空若雲遮則昏月現則淨故大智度論云譬如清淨池水狂象入中令其渾濁若水清珠入水即清淨心亦如是煩惱入心能令心濁善法入心能令心淨故知垢淨無性真妄從緣若昧之則念念輪回遺失真性若照之則心心寂滅圓證涅槃故無性因緣論云阿難調達並為世尊之弟羅睺善星同是如來之胤而阿難常親給侍調達每興逆害羅睺則護珠莫犯善星則破器難收以此而觀諒可知矣若云各有自性不可貿遷則鷹化為鳩本心頓盡橘化為枳前味已消故知有情無情各無定性但隨心變盡逐緣生故偈云如來所有性即是世間性如來無有性世間亦無性所謂無性緣生緣生無性云何熏習起染法不斷所謂以依真如法故依真起妄有於無明以有無明染法因故即熏習真如以熏習故則有妄心以有妄心即熏習無明不了真如法故不覺念起現業又有妄境界以有妄境界染法緣故即熏習妄心令其念六粗著造種種業受於一切身心等苦即業繫苦相先釋染法熏淨翻淨成染也熏習有二義一習熏謂熏心體成染淨等二資熏謂現行心境及諸惑相資等依真如法有無明者顯能熏無明依真如有是依他起以有下顯無明交相顯而成九相也無明熏習真如而成妄心者所謂不思議熏不思議變也言不思議熏者謂無明熏真如不可熏處而能熏故名不思議熏又熏即不熏不熏之熏名不思議熏不思議變者謂真如心受無明熏不可變異而能變故名不思議變又變即不變不變之變名不思議變故勝鬘經云染而不染難可了知不染而染難可了知問此中言真如受熏護法言真如不受熏者何故答護法立義以異熟識從惑業生故立真如常恆不變不許隨緣故唯識云性非堅密能受習氣乃是所熏以真如體無為堅密猶如金石故不受熏此中立義以如來藏為無始惡習所熏名為藏識以如來藏不變隨緣能成染淨故真如因無明薰習而轉成業識此業識心復資熏無明增其不了令其轉成轉識及與現識由此現識境界風動復能鼓動心海轉生識浪念著境界此即意及意識也於中念字即六粗中智相相續相也著字即六粗中執取相計名字相也造種種業等即業相及業繫苦相也此上自本至末以略標此下從末向本以廣釋此心妄境境界無明熏習義則有二種云何為二一者增長念熏習法執二者增長取熏習人執計我我所妄心熏習義有二種云何為二一者業識無明根本熏習能受令阿羅漢辟支佛一切菩薩生滅苦故止為不斷根本業識二者增長分別事識熏習能受凡夫業繫苦故無明熏習義有二種云何為二一者根本即無明熏習以能成就業識即三細業識義故二者所起見愛即六粗事境熏習以能成就分別事識義故先釋妄境熏妄心謂境界熏習之力能令增長微細意識智相相續復能增長事識執相計名及見愛二種煩惱妄心下釋妄心熏無明也一業識能資熏住地無明迷於無相能起轉相現相及智相相續相令彼三乘雖出三界離事識分段粗苦猶受黎耶變易行苦二以事識能資熏現行無明起見愛惑發動身口造種種業受凡夫分段苦無明下釋無明熏真如也一根本無明熏真如成業識二枝末無明熏真如成意識云何熏習起淨法不斷所謂以有真如法故能熏習無明真如有內熏之功真實無妄以熏習因緣力故則令妄心厭生死苦樂求涅槃以此妄心無明有厭求因緣故即熏習真如自信己性自心是佛自法真如知心妄動無前境界修遠離法以如實知無前境界故種種方便起隨順隨順真如行不取不念乃至久遠熏習力故無明則滅以無明滅故心無有起以無起故境界隨滅以因緣無明境界俱滅故心生滅相皆盡名得涅槃成自然業此下釋淨法熏染翻染成淨也先明真如內熏無明能令妄心厭求而成淨業反熏真如增其勢力自信己心本來不動亦無前境則知動心是妄前境是虗修遠離法以求出離以如下釋上修習遠離法也謂於資糧位中初修大乘順解脫分二取隨眠猶未滅伏於加行位復修大乘順決釋分於暖頂位依能取識觀所取空下忍起時印境空相中忍起位於能取識如境是空順樂忍可上忍起時印能取空世第一法雙印空相皆帶相故未能實證入初地時於所緣境無分別智都無所得爾時乃名實住唯識真勝義性即證真如智與真如平等平等俱離能取所取相故此中起隨順行即順解脫分及順決擇分也不取不念以所取空能取亦空也久遠熏習無明則滅者謂自十信至初地為一僧祇二地至七地為一僧祇八地至佛果為一僧祇由過三僧祇方得滅盡故曰久遠以根本無明滅故即無業轉二識故曰心無有起以無此二為能熏故妄境亦滅因即無明緣即境界心相即六染以無明因滅故業等三染心相亦滅以境界緣滅故智等三染心相亦滅翻前妄心妄境故得涅槃以六染皆煩惱礙故翻前無明成自然業自然業者不思議無造化之妙用也以無明為智礙故妄心熏習義有二種云何為二一者分別事識熏習依諸凡夫二乘人等厭生死苦隨力所能以漸向無上道故二者意熏習謂諸菩薩發心勇猛速趣涅槃此釋妄心熏真如也若斷見四住愛盡意識除我執證人空是二乘根器從漸而入者若斷法執證法空發火心求大果是菩薩根器從頓而入者據此則前之五意與意識與法相宗立義各有差別此以執分別俱生法執者為意以執分別俱生我執者為意識也故斷我執者為小乘斷法執者為大乘也真如熏習義有二種云何為二一者自體相熏習二者用熏衆生熏習此釋真如熏習無明也謂念自己體中從無始來具有真如定可作佛名相熏習又念自己與一切衆生元是一體發心決定度脫名用熏習自體相熏習者從無始世來具無漏法備有不思議業作境界之性依此二義恆常熏習以有力故能令衆生厭生死苦樂求涅槃自信己身有真如法發心修行此釋自體相熏習也謂信自己真如體中具足一切無漏性功德相此性德內備有不思議業能作一切勝妙境界之相依此本有體相二六時中如雞抱卵念念不斷恆常熏習由熏習故道力漸勝能令衆生厭苦求樂以實有厭求心故自信體中有真如法發心修行故知真如不守自性隨緣成一切法以諸法唯心所現各無自體虗假相依無決定性以無性故能隨異緣成一切性若有定性猶如金石各有堅性不可令易今此無性猶如於水遇冷成冰逢火成水故中論云集若有定性先來所不斷於今云何斷道若有定性先來所不修於今云何修故知若有定性一切諸法皆不得成若無定性一切皆成故大經云以有空義故一切皆得成也問曰若如是義者一切衆生悉有真如等皆熏習云何有信無信無量前後差別皆應一時自知有真如法勤修方便等入涅槃答曰真如本一而有無量無邊無明從本已來自性差別厚薄不同故過恆河沙等上煩惱依細無明起差別我見見思二惑愛染煩惱依無明起差別如是一切煩惱依於無明所起前後無量差別唯如來能知故意謂真如平等則應一時平等熏習平等知有平等得入涅槃何故復有前後種種差別答謂真如雖是平等而有信不信前後種種差別者以有無明厚薄故也河沙等上煩惱者言無明分劑之多尚在恆河沙等之上此依根果無明而起所知障也我見愛染煩惱者即見思二惑此依潤生無明而起煩惱障也二皆言煩惱者以此二種雖粗細不同皆非寂靜故總名煩惱也言前後者謂發業在前潤生在後唯如來知者以無念故餘皆不知者無明障故經云衆生身中有佛三十二相八十種好坐寶蓮花與佛無異但以自眼有翳妙見不通雖同一性要以智明如樂蘊奇音指妙則宮商應節人懷覺性智巧則動用冥真得失在人精粗由己所以善逝按指發海印光含識舉心現塵勞相又諸佛法有因內熏為因有緣外緣因緣具足乃得成辦如木中火性是火正因若無人知不假方便能自燒木無有是處衆生亦爾雖有正因熏習之力若不遇諸佛菩薩善知識等以之為緣能自斷煩惱入涅槃者則無是處若雖有外緣之之力而內淨法未有熏習力者亦不能究竟厭生死苦樂求涅槃若因緣具足者所謂自有熏習之力又為諸佛菩薩等慈悲願護故能起厭苦之心信有涅槃修習善根以修善根成熟故則值諸佛菩薩示教示佛之見教化衆生利喜乃能進趣向涅槃道此重釋等有真如正因不能具知具證者以無外緣故必內因外緣兩皆具足方得成辦如木下喻明有因無緣不能成就木喻無明火喻正因若無人知喻無善知識指示不能知也不假方便者喻人縱知而不修行亦不能出智慧火燒無明木也不知木中有火者名癡人若知木中有火而不肯鑽求者是自棄人也必也知行並進方得發智慧火燒無明木衆生下法合真如熏習合正因也諸佛菩薩合指火人經云佛法無人説雖慧莫能了故須諸佛菩薩為增上緣也若雖下正言有緣無因亦不能成就未有熏習力者言雖有善知識指示自己悠悠匆匆心力不猛似有如無因循過日亦未能究竟實厭生死實樂涅槃若因下合因緣成就方成辦也必要自己生死心切熏習之力又猛外有明師善友切磋砥礪然後發厭苦心知得生死苦中非久戀之鄉信得涅槃至樂是安身之處方始修習善根善根成熟無明之根漸漸微薄則得親見諸佛耳提面命指示教誨利益歡喜方得進趣涅槃言善根者或指五根或無貪等三根也問若言無師自證即墮自然若從他解仍涉因緣且大道之體非是自然亦非因緣云何開示不乖法體答為破他求故説須自證為執自解故從他印可若當親省之時迷悟悉空自他俱絶尚不見自何況其他故古德云見性不留佛悟道不存師以此自覺聖智無師智自然智之所證處不從他悟以自證之法法從心現不自外來故無師而亦能自得也大慧云我及餘菩薩不由於他通達佛法又經云舍利弗問何故諸賢復發此言從今日始不以佛為聖師諸比丘言從今日始自在其地不在他鄉自歸於己不歸他人自為師匠不用他師故今日不以佛為聖師此乃但可自知方見真實所以千聖拱手作校計不得是以若達此宗歸於自地室中寶藏豈自外來衣內明珠匪從他得用熏習者即是衆生外緣之力如是外緣有無量義略有二種云何為二一者差別緣二者平等緣此釋自體用熏習也即是衆生外緣之力者正謂初發心時便欲度脫一切衆生為己任方見大用也如云當為一切衆生父母為導師為救為歸為舍宅等此皆發心作一切衆生外緣也以差別緣度凡夫二乘以平等緣度菩薩差別緣者此人依於諸佛菩薩等從初發意上求下化始求道時乃至得佛於中若見若念或為眷屬父母諸親在佛上説或為給使或為知友或為冤家或超四攝乃至一切所作無量行緣六度萬行以起大悲熏習之力能令衆生增長善根若見若聞四悉檀得利益故此緣有二種云何為二一者近緣根利緣速得度故二者遠緣根鈍久遠得度故是近遠二緣分別復有二種云何為二一者增長行種種六度苦行緣二者受道破惑見理緣先釋差別緣言此人者指發心修行人也此人從初發心時不依二乘發心即依諸佛菩薩發心願為一切衆生作差別緣願我從初發心求道乃至最後成佛時于三阿僧祇劫中以法眼天眼慈心悲心或曾見彼或曾念彼我悉現種種身為彼作增上緣令彼增長善根得大利益或為下正顯差別因緣為眷屬者父母親戚之類為給使者供給使令之人為知友者如道吾之化雲岩岩頭之悟雪峯等為冤家者如調達之害佛傲象之害舜等所謂或順或違無非增上也四攝者謂布施愛語利行同事也大悲熏習之力者言作此類皆是菩薩同體大悲之力故現種種差別身相親近衆生能令見者聞者漸長善根皆得利益如師子現指醉象禮足慈母遇子盲賊得明城變琉璃石舉空界釋女瘡合調達病痊皆是本師積劫熏修慈善之力令一切衆生自心所現得利益也言近緣者如信根已成熟者令彼一言之下心地開通如馬師之化大梅南泉之化趙州等遠緣者觀其信根下劣必經遠劫方始得度者為作遠緣如十六王子説法華經令受經者經無量劫方得度等增長行緣者謂己信而受道修行者與彼作增長緣若未信而未受道者與彼作受道緣若不作此受道因緣當來不得化彼故平等緣者一切諸佛菩薩皆願度脫一切衆生自然熏習常恆不捨以同體智力故隨應見聞而現作業所謂衆生依於三昧乃得平等見諸佛故又三昧中見諸佛法身以平等法作平等緣度菩薩根令彼成佛也如法華云化一切衆生皆令入佛道如我昔所願今者已滿足正言佛度衆生我願亦爾縱不為彼善友知識以我度生願力自然熏習常恆不捨以與衆生同此智力故隨衆生應見應聞即為示現彼所當得自在業用此是衆生依真如三昧得見平等法性佛時便是此緣此緣亦是啐啄同時觀此二緣則知背佛深恩亦已多矣所謂父雖念子而子終不念父父子終身不得相見職此之由金光明疏云法性身佛者非是二乘下地凡夫之所知見唯應度者示令得見此即無身之身無相之相以一切智為頭第一義諦為髻八萬四千法門髮中道大悲眼白毫無漏鼻十六空舌十八不共齒四弘誓肩三三昧腰如來藏腹權實智手定慧足如是等相莊嚴法性佛此體用體用合明熏習分別復有二種云何為二一者未相應謂凡夫二乘初發意菩薩等以意意識熏習依信力故而能修行未得無分別心與體相應故未得自在業修行與用相應故二者已相應謂地上法身菩薩得無分別心與諸佛智用相應唯依法力真如之力自然修行得無功用道熏習真如此二種多在真如內外滅無明故未相應者謂凡夫二乘伏意識熏習真如三賢菩薩伏意熏習真如也意識熏習真如者知意識是生死因今欲斷之故以真如熏習意識斷我執而證人空不斷分別法執未得無分別根本智與平等法身相應又未得後得智自在業用與報化二身相應意熏習真如者謂此三賢位中雖知此染意能為法障雖依信力加行修行猶未能斷未得平等性智故不與平等法身相應又未得後得自在業用故不與報化二身相應故曰不相應也已相應者謂初地已上菩薩已斷分別法障得無分別根本智得證如來一分平等法身故與諸佛智相應又證一分無分別後得智故與諸佛用相應由初地斷分別心以證無分別智自二地以上唯依真如法力任運修行不勞作意真如漸證無明漸滅故曰已相應也問地上菩薩猶有智識等四意在如何得説相應而與地前有異答相續識是分別法執初地已斷故得無分別智與理相應智識雖在但是俱生不障見道故況從二地以至七地亦已斷盡二種粗識既盡妙平二智已成內智外現復何所礙雖餘三種細識以有妙平二智為主不乖相應所以不同地前事識現行未得相應也復次染法從無始已來熏習不斷乃至得佛後則有斷淨法熏習則無有斷盡於未來此義云何以真如法常體用俱常熏習故妄心則滅法身顯現起用熏習故無有斷此總結前文雖染法淨法起不斷絶究而言之由此染法熏習不斷本來未曾覺悟故説無始至成佛時染法可斷故説有終而此淨法熏習盡未來際終無有斷問染淨二法同一覺心何故染熏可斷淨熏不可斷答以染法是新熏故至成佛時染熏一斷更不復生淨法是本來具足故染心一滅即證法身便能發起不思議業用為諸衆生作增上緣復熏習真如盡於未來終無有斷故復禮法師問天下學人真妄偈曰真如性本淨妄念何由起從真有妄生此妄安可止無初即無本有終應有始無始而無終長懷懵茲理願為開微妙析之出生死清涼國師答云迷真妄念生悟真妄即止能迷非所迷安得全相似從來未曾悟故説妄無始知妄本自真方得恆常理分別心不止何由出生死宗密禪師釋云大乘經教統唯三宗一法相宗二破相宗三法性宗此問是法性宗中嚙鏃關節不問二宗以法相宗所説一切有漏妄法無漏淨法無始時來各有種子在阿賴耶識中遇緣熏習即各從自性起都不關真如不言從真生妄彼説真如一向無為寂滅故不言從真起妄也若破相宗一向説凡聖染淨一切皆空本無所有設有一法過涅槃者亦如幻夢彼且真亦不立何況於妄故亦不言從真起妄也唯疑法性宗以此宗經論皆言從真起妄故如云法身流轉於六道名曰衆生如云如來藏受苦樂等又言悟妄即真如云初發心時便成正覺知妄本自真見佛即清淨等又言凡聖混融如云一切衆生本來成正覺般涅槃毗盧遮那身中具足六道等又云真妄相即雖説煩惱菩提無有始終又説煩惱終盡方名妙覺因義宗有礙自語相違故發此問諸師所説但説無垢染耳唯清涼所答約真如不變不礙隨緣方為契當今宗密試答云本淨本不覺由斯妄念起知真妄即空知空妄即止止處名有終迷時號無始因緣如幻夢何終復何始此是衆生原窮之出生死又人都謂真能生妄故疑妄不窮盡為決此理重答前偈不是真生妄妄迷真如起知妄本自真知真妄即止妄止似終末悟來似初始迷悟性皆空性空無終始生死由此迷達此出生死又釋云無始而有終長懷懵斯理者即法相事而例難之今云有妄即真則同無終始若分別説應有四句真如則無終無始真智則無終有始無明則無始有終瞥起妄念則有終有始若約圓融同無終始既無終始亦復無有無終無始唯忘言絶慮可會斯玄詳上答意深合圓宗於隨緣門初即迷真起妄後乃悟妄即真於迷悟中似分終始約不變門妄自本空誰論先後真俗無性聖凡但名譬如迷繩作蛇疑杌為鬼真諦非有俗諦非無二諦相成不墮邪見是以俗諦不得不有有常自空真諦不得不空空常徹有今時學者多迷空有二門盡成偏見唯尚一切不立拂迹歸空於相違差別義中全無智眼既不辨惑何以釋疑故云涅槃心易曉差別智難明若能空有門中雙遮雙照真俗諦內不即不離方可弘法為人紹隆覺位已上釋熏習竟復次真如自體相者一切十法界凡夫聲聞緣覺菩薩諸佛無有增減非前際生非後際滅畢竟常恆從本已來自性滿足一切功德所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨心義故常樂我淨義故清涼不變自在義故具足如是過於恆沙不離不斷不異自體不思議佛法乃至滿足無有所少義故名為如來藏在纏亦名如來法身出纏此下釋立義分中能示摩訶衍自體相用故先明體大謂真如平等故在聖在凡不增不減非生故常非滅故恆法王經云若説如來為小乘説小乘法為闡提説闡提法是斷佛性是滅佛身是説法人當歷百千萬劫諸地獄何以故衆生之性即是佛性從本已來無有增減云何於中分別藥病是知一切法皆是佛法正此意也從本下顯相大也言本來者非今有也言自性者非外來也言滿足者不欠少也言一切者是普該也言大智慧光明義者無明殼中有慧日也遍照法界義者虗妄見中有法眼也真實識知義者夢幻境中有真諦也自性清淨義者染污識中有淨性也常樂我淨義者生滅法中有真常也生死苦中有真樂也二無我中有真我也二種障中有真淨也衆熱不能到故清涼二死不能易故不變業繫不能縛故自在呼之即應故不離用之不匱故不斷今古常然故無異擬心不得故不可思言語不及故不可議由自體中具足如許佛法故在因中名如來藏以能含孕如來妙寶王剎故在果名法身於一切法成等正覺故大乘法界無差別論云衆生法身既與如來法身相應何故無有如來德用應知此如蓮未開諸惡見葉共包裹故如金墮廁在於覺觀糞穢中故如滿月被蝕我慢羅睺所執取故如池水被濁貪欲塵土所混雜故如金山被翳瞋恚泥垢所封著故如虗空被覆愚癡重雲之所蔽故如日未出在無明習氣地中故如世界未成在六處水大藏中故如雲無雨相違緣現前故問曰上説真如其體平等離一切相云何復説體有如是種種功德答曰雖實有此諸功德義而無差別之相等同一味唯一真如此義云何以無分別離分別相是故無二復以何義得説差別以依業識生滅相示此云何示以一切法本來唯心實無於念而有妄心不覺起念見諸境界故説無明心性不起即是大智慧光明義故若心起見則有不見之相心性離見即是遍照法界義故若心有動非真識知無有自性非常非樂非我非淨熱惱衰變則不自在乃至具有過恆沙等妄染之義對此義故心性無動則有過恆沙等諸淨功德相義示現若心有起更見前法可念者則有所少如是淨法無量功德即是一心更無所念是故滿足名為法身如來之藏此下問答通妨也前云真如平等離相不應復説體中復有種種差別功德答言離相者是離一切虗妄差別染相今所有者是真如體中所具清淨功德相此功德相雖有種種實無差別以等同一味全相是體故問既曰實有種種功德何故復説本無差別答以無虗妄分別心故雖有種種功德而實無差別也問既曰本無差別何故復説種種功德答皆依業識生滅相中顯示種種差別功德問此諸功德於生滅相中云何顯示答以一切法本來唯一真如實無種種名種種相所謂天地同根萬物一體由最初不覺忽起動心遂生三細復現六粗於是差別之相紛紜雜糅並立乎前將此大光明藏轉為無明若心性不起復轉此無明為大智慧光明若心起見則見此而不見彼所見甚小心性離見如白日麗天無物不照若心有動則知名義不達真如不可謂之真知一動則遺失真性故無有自性一動便是生滅不可謂常一動便招苦果不可謂樂一動便能背覺不可謂我一動遂成染心不可謂淨一動遂成熱惱不得清涼一動便有衰壞不可謂不變一動便有業繫不可謂自在極而言之更有無量妄染皆由一動而起故除此一動顯示無量淨功德相以由翻染成淨故自體相用必在生滅門頭顯示也故知覺與不覺皆在生滅門中相待而立若在真如門中二俱不存故圓覺經云生死涅槃同於昨夢楞嚴云妙性圓明離諸名相問何故一動則不見淨法不動則淨法滿足答若心有動更見目前有一法可當情念者則應自心便少一種淨法矣正如一碧晴空才起片雲便少一片青天片雲不起青天自然滿足故知妄念愈多淨法愈少若無所念而淨法方得滿足也故宗鏡云若了自心無事不辦或妄取前境却成內自不足牛頭云諸佛於此而得菩提諸佛於此而轉法輪諸佛於此而般涅槃此是心處得菩提色處轉法輪眼處入涅槃若爾者則知妄身究竟涅槃法身常在淨土具足更少何物復更何求初發心時便成正覺故曰為學日益為道日損復次真如用者有大體顯此大用所謂諸佛如來本在因地普賢萬行之時發大慈悲修諸波羅蜜攝化衆生立盡法界虛空界大誓願盡欲度脫等廣大心衆生界亦不常心限劫數盡於未來際以取一切衆生如己身故度衆生如度己而亦不取人吾衆生相此以何義謂如實知一切衆生及與己身真如平等無別異故以有如是度衆生大方便智觀衆生空除滅無明見本法身自然而有不思議業種種三輪之用有大體當有大用即與真如等遍一切處又亦無有用相可得何以故謂諸佛如來唯是法身智相有妙用而無相可得之身第一義諦無有世諦境界照而常寂離於施作但隨衆生見聞得益惑應道交故説為用此下釋用大也舉如來因地者見得果上不思議業用由因中悲智所修成也慈悲者四無量之二也諸波羅蜜即十度也以此十度攝化衆生到彼岸故大誓願即願波羅蜜也盡欲度脫等衆生界者無處不度也亦不限劫數盡於未來者無時不度也取一切衆生如己身者不見有我相也亦不取有衆生相者不見有人相也唯無我無人故度盡衆生無生可度問既曰取衆生如己身又曰不取衆生相者何義答良以衆生與己原是一體由情生智隔相變體殊故分人分我今既以大悲度諸衆生復以大智觀察自他同一法性無有別異即用此智破滅無明親見本有法身從法身中自然流出不思議業用現種種身度脫衆生其所現身即與真如平等遍一切處雖有如此大用而亦亡其用相故不見我為能度衆生為所度也問既有如此業用又無用相可得者何故答如來之身是法性身如來之土即法性土故雖現種種身種種土無非皆從法性海中自然流出非若世人有心造作施設名之為用皆就衆生見聞得益故説為用其實如來分上實無用相故知真心妙用隨感隨現如春工之肖物如空谷之答響故宗鏡云若以如如佛法性佛何人不具若以國土身虗空身何法不圓則處處皆是寶坊丘陵誰立念念咸成正覺妄想何生故魏府老洞華嚴云佛法在日用處在行住坐臥處吃茶吃飯處語言相問處所作所為舉心動念又却不是也故知學道之人別無方便只是日用處不迷真心自然顯發耳此用有二種云何為二一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色有分齊不能盡知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身他受身身有無量身色色有無量相相表德稱相有無量好好有無量光明所住依果亦有無量種種莊嚴隨所示現相好即無有邊不可窮盡離分齊相隨其所應常如來法身能住持不毀不失如是功德皆因諸波羅蜜等無漏行熏及不思議熏指內熏之所成就具足無量樂相故説為報此釋凡夫二乘所見名應身也由彼凡夫二乘迷於本識順於事識然此事識粗顯猛利任運分別依此粗分別識但見應化粗相不見報身細相如凡夫見佛是老比丘相二乘見佛是阿羅漢等而彼不知此應身者皆由見相未忘元從自己第八轉識所現不達唯識計有外塵今見佛身亦在心外遂執心外實有是相又不達即色是心本無分劑取分劑相殊不知佛之化身是隨感而應實無限量也二者下釋菩薩所見者名報身也十信已還皆順業識故在資糧位中至究竟地所見佛身皆名報身言報者以業識是總報主故轉此識者皆得見報身也身有下顯正報無分齊也所住下顯依執亦無分齊也隨其所應者謂彼菩薩心無分齊故所見亦無分齊也常能住持不毀不失者非若化身之有去來生滅也如是下結歸本因無漏行熏者即十波羅蜜所熏無漏業也不思議熏者即真如熏無明也由斯二種熏習之力故能以有漏無明所招生死苦報轉成無漏寂滅樂相故名報身故知佛無依處應機普現色無定色若摩尼之應青黃形無定形猶光影之任修短相無定相似明鏡之對妍故隨樂皆現又凡夫二乘所見者是其粗色隨於六道各見不同種種異類非受樂相故説為應復次初發意菩薩等所見者以深信真如法故少分而見知彼色相莊嚴等事無來無去離於分齊唯依心現不離真如然此菩薩猶自分別以未入法身位故若得淨心所見微妙其用轉勝乃至菩薩地盡見之究竟若離業識則無見相以諸佛法身無有彼此色相迭相見故此以凡夫六道所見者為應身也由凡夫帶過去六道惡業習氣或見佛身受金槍馬麥打身出血或見佛是樹神天神黑腳象三尺身乃至羊中見羊鹿中見鹿俱非樂相大乘初終頓教菩薩既達唯識了此佛身乃是賴耶識中轉識所現故見佛身唯是心現不離真如無有分齊遍一切處隨衆生根任運顯現是受樂相也復次下顯三賢十聖所見者為報身也深信者三賢菩薩解真如法異前十信故曰深未證法身故曰信得相似覺故曰少分而見知彼身土二相本無去來亦無限量皆是自心所現之量然未斷分別法執未得親證平等法身故但言知若證初地得無分別智證一分平等法身得隨分覺所見報身比於地前轉更微妙所作業用轉勝地前二地勝初三地勝二乃至十地所見最極微細此外更無殊勝之相故曰究竟至妙覺地無明已盡業識已空見相隨盡唯是真如更無見相以諸佛各證法身無彼此相可得見故故曰佛不見身知是佛若實有知別無佛問既曰衆生等同佛性應當一時成佛云何三乘見佛各有差別答法身無相真性無形形相尚無云何差別是自識鏡照影不同如五百婆羅門見灰身而生信劬尸羅長者覩三尺而發心無邊身菩薩窮上界而有餘住小聖凡夫觀丈六而無盡皆是隨心感現影像不同自業差殊非佛有異觀一水而俄分四等皆自見殊共寶器而飯色不同非他業受問曰諸佛法身離於色相者云何能現色相答曰即此法身是色體故能現於色所謂從本已來色心不二以色性即智故色體無形無形相強名説名智身以智性即色故真空法性心色名二説名法身以法為身遍一切處所現之色無有分齊隨心能示十方世界一毛一相一光明遍照法界無量菩薩無量報身無量莊嚴各各差別皆無分齊而不相妨此非心識分別能知以真如自在用義故法身全是色體故能現色如明鏡全是像體故能現像臨濟云四大不解説法聽法虗空不解説法聽法只汝目前歷歷孤明勿形段者始解説法聽法所謂勿形段是諸佛法身亦是汝之本心也所謂下正明色心不二由色即心遂令色相都盡故就其本但云智身智謂本覺智也由心即色遂令心即是色故説法身遍一切處而所現色實無分齊但是隨心現分齊耳若有無量菩薩各各不同如來隨菩薩心現無量報身報土亦各各不同然皆無有分齊而彼此不相妨礙此皆如來不思議境界非思量分別所知境也以此是真如之用周遍圓融自在無礙故宗鏡問云既云諸佛法身本無色相云何現種種色相答大涅槃云譬如一人多有所能若其走時則名走者若將刈時則名刈者若作食時名作食者若治材木則名工匠鍛金銀時名鍛金師法亦如是其實是一而有多名故約用分多體恆冥一舒為萬法卷即一心一中無量無量中一故知一心之旨是圓頓門是具足道已上釋自體相用竟復次顯示從生滅門即入真如門所謂推求五陰色之與心六塵境界畢竟無念觀察六塵境界無有自性以心無形相十方求之終不可得生滅即真如如人迷故謂東為西方實不轉衆生亦爾無明迷故謂心為念心實不動若能觀察知心無念即得隨順入真如門故此總結從生滅門歸真如門也推求者即能觀之智色心境界即所觀之境畢竟無念者內身外境一一推求終不見有一𮈔毫許心念可得以此心無形段故既能現之心尚不可得而所現之境又可得耶故南泉云然燈佛道了也若心想所思出生諸法虗假不實何以故心尚無有云何而有出生諸法猶如形影分別虗空如人取聲安置篋中亦如吹網欲令氣滿正此意也如人下喻明衆生下法合若能下結歸初門知心無念是佛祖相傳入真如門之祕旨故於此復結之通心論云夫縛從心縛解從心解解縛從心不關餘處出縛之要唯有觀心觀心見性一切俱了是故智者先當反觀自心欺誑不實如幻如化躁擾不住猶如猿猴騰躍奔擲猶如野馬實無自性由境而有無境則無又觀諸境境無自性由見而有不見自無又推見處見無自性由心動有不動則無又推動心動無自性獨由不覺覺則不動又推不覺無有根本直從無始虗習念念自迷無念真如一無所有此即從生滅門入真如門之要訣也此上顯能立門竟對治邪執者一切邪執皆依我見我見乃邪執之根本若離於我則無邪執是我見有二種云何為二一者人我見約凡夫説二者法我見約二乘説此下顯能破門也推理不當曰邪堅著不捨曰執我見者從我起見故名我見此是二執之本一計五蘊法實有主宰名人我見二計五蘊法實有自性名法我見此中以誤執如來身為人我見又誤執實理為法我見由邪見衆生執藥成病故論師復因病施藥也人我見者依諸凡夫説有五種云何為五一者聞修多羅説如來法身畢竟寂寞猶如虗空以不知佛為破著衆生故即差謂虗空是如來性云何對治明虗空相是其妄法如來體無不實以虛空對色故有是可見相令心生滅以一切色法本來是心實無外色離心無色可得若無色者則無虗空之相所謂一切境界唯心妄起三細故有若心離於妄動則一切境界滅唯一真心無所不遍猶如清淨虛空此謂如來廣大性智究竟之義非如虗空相故此誤執頑空為覺性也云何下出正義言虗空是妄法者晦昧所成故體無者有名無體故不實者不可撮摩故對色故有者因色顯空是對待法故是可見相令心生滅者蒼蒼之色是眼所對境能生滅故以一切色法皆是自心離心之外實無有色若無有色亦復無空故知空色二法悉是唯心妄動而有心若不動色空自無唯一真心無處不遍故經云空生大覺中如海一漚發又云不知虗空外洎山河大地咸是妙明真心中所現物故論中所説者皆指如來廣大性智究竟之義是如實空是畢竟空故借虗空為比例耳非謂虗空即是如來性也故曰離念相者等虗空界二者聞修多羅説世間諸法畢竟體空乃至涅槃真如之法亦畢竟空本來自空離一切相以不知為破著故即謂真如涅槃之性唯是其空云何對治明真如法身自體不空具足無量性功德故此誤執斷空為真如也世間法即生死法也涅槃真如法即出世間法也唯是其空者言生死涅槃但是一空更無一物所謂豁達空也云何下出正義此中所言生死涅槃屬生滅門是對待法故但言空真如自體具足河沙稱性功德故言不空所謂真空不空非斷滅空也如云無心但是心中無物名無心非無心體名無心也喻如空瓶以瓶中無物名空瓶非瓶體亦無名空瓶也故祖師云汝但無事於心無心於事自然虗而靈寂而妙據此則是無妄心非無真心也三者聞修多羅説如來之藏無有增減體備一切功德之法以不解故即謂如來之藏有色心法自相差別云何對治以唯依真如義説故因生滅染義示現説差別故此誤執如來藏中有色心法也云何下出正義體備諸功德無增減者是依真如平等義説色心差別有增減者是因生滅染污義説故曰唯依妄念而有差別又云以依業識生滅相示也四者聞修多羅説一切世間生死染法皆依如來藏而有世間諸法不離真如以不解故謂如來藏自體具有一切世間生死等法云何對治以如來藏從本已來唯有過恆沙等諸淨功德不離不斷不異真如義故以過恆沙等煩惱染法唯是妄有性自本無從無始世來未曾與如來藏相應故若如來藏體有妄法而使證會永息妄者無有是處此誤執如來藏有染污法也云何下出正義以如來藏唯與諸淨功德相應不與染法相應以一切染法性自本無未曾與如來藏相應故曰所言空者與一切染法不相應故一切衆生以有妄心念念分別故説為空若如來藏實有染汙法而欲使人人證入人人契會令彼染汙永斷不起者決無是理由如來藏本無染汙故能永斷也古德云染汙即不得修證則不無正此義也已上四執初二是習頓教空教及南宗禪學失意者所執次二是習大乘法相宗及北宗禪學失意者所執五者聞修多羅説依如來藏故有生死依如來藏故有涅槃以不解故謂衆生有始以見始故復謂如來所得涅槃有其終盡還作衆生云何對治以如來藏無前際故無明之相亦無有始若説三界外更有衆生始起者即是外道經説又如來藏無有後際諸佛所得涅槃與之相應則無後際故此誤執染淨俱有始終也謂最初起一念生相無明是衆生有始今以始覺而覺生相則生相滅是衆生有終而覺有始覺既有始必有終故云何下出正義由法無前際則知生死無始法無後際則知涅槃無終故云染法熏習不斷後則有斷是無始而有終也淨法熏習則無有斷盡於未來是無始無終也上破我執下破法執法我見者依二乘鈍根故如來但為説人無我以説不究竟見有五陰生滅之法怖畏生死妄取涅槃云何對治以五陰法自性不生則無有滅本來涅槃故此誤執五蘊為實法也由如來説法先後隨時以見二乘根鈍怖畏生死故説涅槃不為説一切法本來常住實無生滅故雖斷我執證人空猶墮法執云何下出正義以五陰法是依他起本無自性尚無有生欲何為滅依於此義故説一切衆生本來常住入於涅槃故知若執心境是實人法不空徒經萬劫修行終不證果若頓了無我深達物虗則能所消何法不證似輕舸隨迅流猶微塵揚順風只恐不信一心自生艱險若入此門無法不可故般若經云佛言我於一切法無所執故得常光一尋身真金色是以但於人法二執俱亡一道神光自現先德云如今要會直會但不取一切相即得更無別語若知諸法從心則不應執執則不知復次究竟離妄執者當知染法淨法皆悉相待無有自相可説是故一切法從本已來非色五陰非心非智真如之體非識非有非無究竟不可説相而有言説者當知如來善巧方便假以言説引導衆生其旨趣者皆為離念歸於真如以念一切法令心生滅不入實智故已上破我破法分染分淨皆是一期方便是對待法總屬共相皆是生死岸頭事未云究竟以自相法不墮言説相故必也染淨俱空寸絲不挂方與本來面目默默相契如魚飲水冷暖自知正不與言説相關也故一切法推其自相本無色心智識有無等相可説然而説色説心説智説識説有説無皆是如來善巧方便以假名字引導衆生其實如來旨趣要人百不思百不會不著有無染淨親見本來復還本地是其旨趣以思善思惡皆是發業無明作主令心生滅不能得入真如實智故古德云是句亦剗非句亦剗此是佛祖相傳心法故諄諄及此釋能破門竟分別發趣道相者謂一切諸佛所證之道一切菩薩發心修行趣向義故略説發心有三種云何為三一者信成就發心二者解行發心三者證發心一分無明破由立二門已分邪正竟此下方顯菩薩發心趣向佛道之相由前云一切菩薩皆乘此法到如來地故然有三賢十聖位次不同發心修行趣證亦異故須分別也信成就發心者信者即擔當之謂必滿一萬劫方得成就以此事是難解難入之門難省難知之法所以法華會上舍利弗三請四衆驚疑只如五千退席皆是已得聖果之人聞説直指自心尚懷疑惑拂席而起何況末法初機遮障既深見思尤重情塵尚壅欲火猶燒而能擔荷斯大事者歟是以妙得其門成佛不離於當念若失其旨修行徒困於多生唯在信心別無方便以信是入道之原功德之母但信此宗理事圓足故解行發心者自十住至十回向以能解法空順行十度十度成熟發回向心故故宗鏡云見解圓明是目行解相應是足目足更資理行扶助可趣涅槃之域能到清涼之地若定慧未熏如摩尼匿礦性相不辨猶古鏡未磨欲望雨寶鑑容無有是處若意既淨心鏡才明更以萬行熏修轉加光潔如先德云一切佛事無邊化門皆依自法融轉而行由自心中有真如體大今日體解引出法身由自心中有真如相大今日了達引出報身由自心中有真如用大今日修行引出化身乃至十波羅蜜一切塵沙萬行皆是自心引出未曾心外得一法行一行也證發心者自初地至十地以初發心趣向佛道此方證故問既信即心便是何用更修答只為便是所以更修如鐵中非金即不能煅成妙器問此中進修是頓是漸答若約進修是頓悟漸修若約斷障如日頓出霜露漸消若約成德如孩始生即具肢體長養成人志氣漸立故經云初發心時便成正覺三賢十聖次第修證良以非真流之行無以契真若未聞此法未入此門縱經多劫修六度萬行終不證真又頓悟之人如師子兒初生之時即成師子不先頓悟猶如野干隨逐師子經百千劫終不得成師子故知若不先了自心豈成圓頓隨他妄學不入真宗又若因悟而修即是解悟因修而悟即是證悟故知直了真如一心即名為佛是圓頓宗若依此心發心修行者是別教大乘與圓頓教即心便具者所有功行日劫相倍故曰即心者疾發心修行者遲問此論之旨既已信入發心修證是何教攝答是借別教以明圓也信成就發十信心者依何等人修何等行得信成就堪能發心所謂依不定聚衆生十信凡夫有熏習內因外緣善根力故信業果報因果不差能起十善止惡行善厭生死苦觀三界如牢獄欲求無上菩提得值諸佛親承供養修行信心經一萬劫信心成就故因精進而鈍根有四種俱一萬劫乃成就法相諸佛菩薩教外緣令發心或以大悲故觀衆生一體故為大悲能自發心或因正法欲滅以護法因緣故見正法將滅菩薩如自己行滅乃護佛法能自發心如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應此有三聚一是十住已上決定不退信心者名正定聚未入十信不信真如三寶因果者名邪定聚此二中間欲求大乘而心未決定或進或退如空中毛者名不定聚今依此人明修行也有熏下辨因行也曾於善知識邊聞十善法力及本覺內熏力故能信業果報而修十善厭生死而求菩提內有是因故感諸佛為增上緣承事諸佛修行信心經一萬劫方得成就信位有十謂信進念定慧施戒護捨願也一萬劫約根利鈍料揀有四一利根精進二利根不精進劫數皆不可定三鈍根精進極遲者一萬劫鈍根不精進者劫數亦不可定今唯取第三故云一萬劫也信心成就諸佛教令發心者是待徼揚勸勉而入發心住也或以大悲者為衆生也或因正法者為佛法也能自發心者謂從自己胸中流出不待諸佛勸勉能以衆生佛法一肩擔荷直入發心住也楞嚴經云以前十信圓成一心名發心住信心入住畢竟不退得與如來氣分交接得住如來種中故在住位有入胎出胎童真法王子之名言如來種者所謂慈悲為佛眼正念為佛頭妙音為佛耳香林為佛鼻甘露為佛口四辨為佛香六度為佛身四攝為佛手平等為佛指戒定為佛足種智為佛心是也若有衆生善根微少久遠已來煩惱深厚雖值於佛亦得供養然起人天種子或起二乘種子設有求大乘者根則不定若進若退或有供養諸佛未經一萬劫於中遇緣亦有發心所謂見佛色相而發其心或因供養衆僧而發其心或因二乘之人教令發心或學他發心如是等發心悉皆不定遇惡因緣或便退失墮二乘地此節是下文修行信心分之張本也上言從不定聚入正定聚此正言不定聚也由善根微弱煩惱深厚故雖值佛不能發菩提心或起人天二乘種子設有求大乘者未有決志故進退不定或有遇緣發心者不由己而由人也所謂下是見相發心也或因人教者是隨人口吻也或學他者是倣效他也此皆因人碌碌自無主宰腳跟未隱故遇緣而進復遇緣而退皆名不定古德云除非自解倒騎牛一生不著隨人後是知一心妙門非大智不能觀非大根不能信觀之則齊佛智信之即入圓通信之一字豈易言哉問涅槃經云聞常住二字尚得七世不墮地獄何故經言第六住心及凡夫信位猶言有退答十信之中勝解未成未得謂得便生憍慢不求善友不敬賢良為怠慢故久處人天便能成就大地獄業若一信不慢常求勝友即無此失故經云聞如來名號及所説法即不信猶能畢竟至於金剛智地何況信修者乎復次信成就發心者發何等心略説三種云何為三一者直心正念真如法故二者深心樂集一切諸梵善行故三者大悲心欲拔一切衆生苦故此言信心成就復發三心也言直者不思善不思惡無欲無依故曰直心正念真如者不起一念名正念真如暫起一念便邪了也曲了也落路落草也此直心是二行之本言深心者無善不修也智者大師疏觀經云深者佛果深高以心往求故云深心亦從深理生亦從厚樂善根生故十地經言入深廣心涅槃經云根深難拔故言深心言直心等三心者此與十六觀經中三心義合彼云一者至誠心二者深心三者回向發願心今初云直心即彼至誠心至誠心者即實行衆生至之言專誠之言實非直心正念真如豈名專實解於深心彼疏雖三義而不相捨求高深果須契深理欲契深理須厚樂善根此乃立行依理求果也彼經證成三種深義不出此樂集一切諸善行也彼經回向發願心即此大悲拔苦之義蓋以真如實念趣果善心二心功德善巧回向願生淨土速證法忍廣拔一切衆生苦惱然此三心順於三法何者初念真如平等一性次二即是自行化他二種修義既是修二性一乃就圓融三法而發心也今此三心一念中修見思塵沙任運先去入第十信大悲者無生不度也故知萬行所起起自真如緣會所入入於真如菩薩發心先念真如菩薩起信先信真如菩薩契會先契真如也問云何是真如之相答不信一切法是信真如以真如理中本無諸法若見諸法為有是信諸法不信真如是以若無夙植廣大菩提種子卒難取信故祖師云大緣與信合故知能信是法者此非小緣也然真如之理無自無他非一非異包含一氣該入萬有若復有人自性清淨含一而生中無妄想即謂聖人然真如中亦無聖人法如微塵許而有異也若復有人自性清淨含一而生中有妄想自然濁亂則謂凡夫然真如中亦無凡夫法如微塵許而有異也故經云佛性廣大難量聖凡不二一切圓滿咸被草木周遍螻蟻乃至微塵毛孔莫不含一而生故曰通於一而萬事畢是以正念真如為諸行之原也問曰上説法界一相佛體無二何故不唯念真如復假求學諸善之行答曰譬如大摩尼寶體性明淨而有礦穢之垢體性本淨然亦不妨有垢若人雖念寶性不以方便種種磨治終無得淨如是衆生真如之法同具真如體性體性空淨而有無量煩惱垢染若人雖念真如不以方便種種熏修梵行亦無得淨以垢無量遍一切法故修一切善行以為對治若人修行一切善法自然歸順真如法故寶性喻真如礦穢喻無明念寶性而不磨終無有淨將天真而不修終無作用故正念真如復修善行動作施為自然歸順真如矣略説方便有四種云何為四一者行自利利他根本方便謂觀十法界一切法自性無生本自無生離於妄見不住生死不同凡夫得真空理觀一切法因緣和合業果不失起於大悲修諸福德攝化衆生不住涅槃以隨順法性無住故此以無住為行根本方便也淨名云從無住本建立一切法故先德云生而無生法性湛然故不取一切法不作諸惡而成大智不住生死無生而生業果儼然故不捨一法廣行衆善而成大悲不住涅槃以法性本來無住故我隨順法性亦無住也二者能止方便謂慚愧悔過能止一切惡法不令增長以隨順法性離諸過故慚者依自法力崇重賢善為性對治無慚止息惡行為業愧者依世間力輕拒暴惡為性對治無愧止息惡行為業十一善法之二也悔者四不定法之一也易云震無咎者存乎悔具此三者則未生之惡不令生起已生之惡不令增長所謂諸惡不作也以法性本無過惡故隨順法性亦離過惡也三者發起善根增長方便謂勤供養禮拜三寶讚歎隨喜勸請諸佛以愛敬三寶淳厚心故信得增長乃能志求無上之道又因佛法僧力所護故能消業障善根不退以隨順法性離癡障故未生善令生已生善令長所謂衆善奉行也勤謂精進無有一善不從精進生故供養禮拜三寶者身業也讚歎勸請者口業也隨喜者意業也愛敬者親近不懈無輕褻也淳厚者端莊厚重不劣薄也志求者心口相應非漫然也增長者日有所益不退墮也已上皆善因也三寶所護者善緣也因緣具足業障日消善根日進矣以法性本無癡障故隨順法性亦無癡障也四者大願平等方便所謂發願盡於未來化度一切衆生使無有餘皆令至無上菩提究竟無餘涅槃以隨順法性無斷絶故法性廣大遍一切衆生平等無二不念彼此究竟寂滅故菩薩發是心故則得少分見於法身以見法身故隨其願力能現八種利益衆生所謂從兜率天退入胎住胎從法化生出胎踰城出家明星成道説法轉法輪入於雙林涅槃然是菩薩未名法身以其過去無量世來有漏之業未能決斷隨其所生願力往生不受業牽與微苦相應亦非業繫以有大願自在力故業之所牽如修多羅中或説有退墮惡趣者非其實退權教上説但為初學菩薩未入正位而懈怠者恐怖令彼勇猛故又是菩薩一發心後遠離怯弱畢竟不畏墮二乘地若聞無量無邊阿僧祇劫勤苦難行乃得涅槃亦不怯弱以信知一切法從本已來自涅槃故本來涅槃何有退發願度生盡未來際者以法性不斷故隨順法性者必傳法度生續佛慧命也法性下出度生之所以由法性周遍悉皆平等亦無彼此究竟寂滅菩薩在十住位中發是大願便隨願力少分得見法身住如來種中乘此願力現相人中成道轉輪度諸衆生然此菩薩秖名願身不名法身以未盡煩惱於有漏業亦未決斷故受生之處與微苦相應以有大願力所持隨心自在不被業牽故如修下通權也未入正位者即未入法身位也恐怖令彼勇猛者言十住菩薩已見法身尚有退墮又況我等未見法身者敢懈怠乎又是下顯實也言是菩薩一發大願便將一切衆生一肩擔荷即令入火聚刀山不生畏怯況畏墮二乘地即聞無數僧祇難行苦行方得成佛亦不畏怯以自信本來是佛不待更滅故解行發心者當知轉勝以是菩薩從初正信已來於第一阿僧祇劫將欲滿故於真如法中深解現前所修離相以知法性體無慳貪故隨順修行檀波羅蜜以知法性無染離五欲過故隨順修行尸波羅蜜以知法性無苦離瞋惱故隨順修行羼提波羅蜜以知法性無身心相離懈怠故隨順修行毗黎耶波羅蜜以知法性常定無雜亂故隨順修行禪波羅蜜以知法性體明離無明故隨順修所般若波羅蜜解即十住即即十行二為能發十回向為所發由發回向心故所修十度轉勝於前將滿阿僧祇者謂從初正信以至回向功行將滿一阿僧祇欲入初地時也深解現前所修離相者謂將欲悟入唯識尚未得入以有所得故故在四加行中雙印二空方得所修離相也以知下正釋離相也權教菩薩由未見法性見有貪瞋癡等故以檀波羅蜜等度之此菩薩已見法性知彼法性本無貪瞋癡等然亦不妨隨順覺性而行六度雖行六度亦不見布施等相故曰所修離相也此菩薩所修一度一行皆順真如一心法性之理非是於自性外別有所修以隨順心性故所有功德皆如性起無盡無為不取不捨是知檀因心捨圓清淨之施門戒因心持成自性之淨律辱因心受具無生之大忍進因心作備牢強之進門能觀心性名為上定則禪因心發般若靈鑒窮幽洞徹則智從心起故經云一心不動具足六波羅蜜何者經云無有可與者名為布施豈心外有法可住相耶又云戒性如虗空持者欲迷倒寧執事法分持犯耶又云忍者於一剎那盡一切相及諸所緣豈是對治前境伏捺自心而為忍耶又云若能心不起精進無有涯寧著有為妄興勞慮耶又云不見心相名為正定豈是避喧雜而守靜塵耶又云不求諸法性相因緣是名正慧豈外徇名言強生知解耶是知心外見法即名外道若直了自心不為諸見所動名隨順真如又一念相應捨時即具十度捨而不取名施不為諸相所污名戒忍可非法為忍離身心相為進寂然不動為定決了無生為般若雖空不礙諸相為方便希齊佛果是願思擇不動為力決斷分明為智故一念相應十度圓具華嚴云念念具足十波羅蜜是以十度若圓八萬四千法門一時齊應凡是聖教皆即之於心理無不應若心外行事則取輪回任經三祇終成妄想是以儒重云昔我於無數劫以國財身命施人無數以妄想心施非為施也今日以無生心五華施佛始名為施故華嚴云設於無數劫財寶施於佛不知佛實相此亦不名施古德云萬事須歸體處平是非自向心中混證發心者從淨心地乃至菩薩究竟地證何境界所謂真如以依業轉識説為境界而此證者無有境界唯真如智根本智名為法身是菩薩於一念頃能至十方無餘世界供養諸佛為衆生請轉法輪唯為開導利益衆生不依文字或示超地速成正覺以為法弱衆生故或説我於無量阿僧祇劫修業方當成佛道以為懈慢衆生故能示如是無數方便不可思議而實菩薩大乘種性根等發心則等所證亦等無有超過之法以一切菩薩皆經三阿僧祇劫故但隨衆生世界不同所見所聞根欲性異故示所行亦有差別證者謂入真如門也所言真如即十種真如也一遍行二最勝三勝流四無攝受五類無別六無染淨七法無別八不增減八智自在十業自在所依真如也自初地以至十地由業識未盡斷障各別所證亦異故有十種境界相現非謂真如有十種也業識盡者唯如如理及如如智獨存名為法身無有別異故問法身之理為復有法成無法成生法成滅法成一法成異法成答本覺真宗法身性地口欲言而詞喪心將緣而慮息所以然者以説有則妙體虗玄説無則道無不在説生則三界無物説滅則一性常靈説一則各任其形説異則同歸實相是以不可稱量不可希冀能超四句便是法身大集經云文殊言世尊如來坐菩提樹下得菩提如來則有二相一者如來二者菩提云何名如來已離二相佛言善男子菩提者一切衆生一切法等無差別一味一性如來坐於菩提樹下見如是法是故名為得菩提我不見菩提外別有一法以一切法皆悉平等而是平等不入於數是故平等名為法身是菩下顯其大用不依文字者了知所標畢竟非月故直指人心見性成佛此即達磨不立文字宗也或示者顯其權説而實下顯其實語阿僧祇此云無數亦是不定之稱如人竟日不見便云無數時經年不相見亦云無數時故宗鏡問云成佛之説或云一念或説三祇未審定取何文以印後學答成佛之旨且非時劫遲速之數屬在權宜故對勇猛者説成佛在乎一念為懈慢者説得果須滿三祇但形教迹盡屬權宜故楞嚴鈔云劫者時也而有成住壞空皆由衆生妄見所感且妄見一動外感風輪由愛發故外感水輪由堅執故外感地輪由研求故外感火輪有四大故有六根有六根故見六塵有六塵故有時分若了無明根本一念妄心則知從心所生三界畢竟無有且時因境生境既本空時亦無體何須更論劫數若能一念永斷無明何假更歷三僧祇劫故楞嚴經云不歷僧祇獲法身又云彈指超無學又云歇即菩提故知劫之長短從一念生三界趨果並是夢中説窹若自窹時實無多劫所以法華會中演半日為五十小劫維摩經中演七日為一劫故曰十世古今始終不離於當念如涅槃經云廣額屠兒日殺千羊後發心已佛言汝於賢劫當得作佛諸大菩薩及阿羅漢咸皆疑云我等成佛即經遠劫廣額何故成佛在近佛言欲得速成者即與速欲得遠成者即與遠若頓見真如者即一念成佛故知利鈍在人遲速由我非關劫數此約上上根機頓悟頓修説也又是菩薩發心相者有三種心微細之相云何為三一者真心無分別故二者方便心自然遍行利益衆生故三者業識心微細起滅故此登地菩薩所發三種心也此三種心比之地前轉更綿密故曰微細真心無分別故者入初地時分別法執已斷故得無分別智證遍行真如故得真心也方便心者遍行十度廣利衆生然皆從真起行無有矯強故曰自然業識心者無明未盡流注未空尚有微細生滅故問何故此業識亦名發心答未斷分別無明未露斷分別已無明暫發故亦名發心也又是菩薩功德成滿於色究竟處示一切世間最高大身謂以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益衆生此言菩薩地盡示現成佛也色究竟處即色界之頂也最高大身者色究竟天身量一萬六千由旬自在天王身量三萬二千由旬十地菩薩示為自在天王身量倍增故曰最高大身以色身高大莫過此天故然最後身菩薩示於彼天成佛之相即轉十地菩薩身而為佛身也一念相應慧者即始本最初契合之時名一念也由此一念照破無明得見心性名得一切種智自然而有不思議業用現無量身應無量土度無量衆生所謂大圓無垢同時發普照十方塵剎中問曰虗空無邊故世界無邊世界無邊故衆生無邊衆生無邊故心行差別亦復無邊如是境界不可分濟難知難解若無明斷無有心想云何能了名一切種智答曰一切境界本來一心離於想念心本來離念以衆生妄見境界故心有分齊以妄起想念不稱法性故不能了諸佛如來離於見相無所不遍心真實故即是諸法之性自體顯照一切妄法有大智用無量方便隨諸衆生所應得解皆能開示種種法義是故得名一切種智此疑無心不得名一切種智也意謂衆生境界差別無量難解難知若無明既盡心想亦空亦無有心將何了別種種境界而明一切種智耶答一切境界離於想念本無種種差別亦無分齊以衆生妄見境界故有大小高下染淨差別分齊之相不能遍照以妄起想念障蔽光明不稱法性轉為無明故不能了諸佛不然以離見相不見有境界之相故無所不遍以離無明故得見真實心此真實心即是諸法自性既見法性從法性中起大智用顯照一切妄法以無量方便隨衆生心説種種法示種種義令彼各得解了是故契無心者方得一切種智也又問曰若諸佛有自然業能現一切處利益衆生者一切衆生若見其身若覩神變若聞其説無不得益云何世間多不能見佛答曰諸佛如來法身平等遍一切處無有作意故説自然但依衆生心現衆生心者猶如於鏡鏡若有垢色像不現如是衆生心若有垢法身不現故不見佛身已説解釋分竟此疑衆生不見如來不得名不思議利益衆生也謂如來既有自然業用現身無量普利衆生則應衆生皆得見佛聞法普霑利益何故不見答如來法身無處不遍其現不現悉由衆生心有垢淨非謂如來有現不現也故宗鏡問云法身普遍一切衆生心想中衆生既同一心云何有現不現答如來法身常現無不現時或於一塵頓現或於諸塵普現一塵頓現者如如來眼睫文殊寶冠彌勒樓閣普賢毛孔淨名之維摩丈室摩耶之腹乃至芥子針鋒近塵遠塵各各頓現諸塵普現者謂該一切處徹一切時涉入重重普融無礙古德云一切不思議事於一事悉能普現其唯清淨法身之應用乎所以云若能諦觀心不二方見毗盧清淨身如一念起惡法身即隨惡現一念起善法身即隨善現乃至見色色處現見空空處現名為處處普現切莫遠求諸佛法身即一念心空是若不現者皆是客塵自遮見網自隔非法身咎其猶日月麗天盲者不覩雷霆震地聾者不聞故有福者生即琳琅現薄福者出則荊棘生皆由自心有淨有穢故有現不現耳若了自心俱時平等顯現次説修行信心分此説衆生鈍根福薄受正定説加精進此為善根微少衆生修行信心未滿萬劫來入正定聚者説四不壞信令彼成就信心也是中依未入正定聚衆生故説修行信心何等信心云何修行略説信心有四種云何為四一者信真如根本所謂樂念身心歡悅依行持真如法諸佛之師故二者信佛有無量功德以前所説三輪也常念親近供養恭敬發起善根願求一切智故三者要行信法有大利益常念修行諸六波羅蜜故四者信僧以指十地菩薩能正修行自利利他常樂親近諸菩薩衆求學如實行故習性易染猶如素絲可青可緑亦如湍水可東可西又如尺蠖可蒼可黃以八識中具有十法界種子隨所聞法即發起現行者名未入正定聚衆生今為此等衆生説此四不壞信由彼聞此四不壞信則不退墮故信根本者即是信真如法也樂謂樂欲念謂冥記樂而不念其樂不盡念而不樂其念不實必如蜂念好蜜渴思甘露造次顛沛念茲在茲無有間斷名真樂念若此而有退墮者無有是處故對信成就者説則曰正念對信未成就者説則曰樂念也二者下信三寶也若未信真如所信三寶猶在心外皆不稱實若遇他緣或生退失若先信真如則所信三寶全是真如由是增進信得成就修行有五門能成助以上信此信云何為五一者施門檀度二者戒門尸羅三者忍門羼提四者進門毗利耶五者止禪定觀智慧門定慧雙運信而不行徒信也信何能滿能行此五者信方滿足此即前樂集善行去礦穢之方也云何修行施門若見一切來求索者所有財物隨力施與以自自利捨慳貪令彼利他歡喜若見厄難恐怖危逼隨己堪任施與無畏此施比前又勝若有衆生來求法者隨己能解方便為説不應貪求名利恭敬惟念自利利他回向菩提故施有三謂財施無畏施法施也若見一切下財施也若見厄難下無畏施也若有下法施也傅大士布施頌曰施門通六行六行即六度六行束三檀三檀者資生檀無畏檀法檀布施是資生檀能資益生諸善法故曰資生檀持戒忍辱是無畏檀因戒淨毀辱不動心無怖畏故曰無畏檀法檀者精進禪定智慧是也因定生慈因慧生種種法故曰法檀將此六行束為三檀資生無畏法聲色勿相干二邊純莫立中道不須安安邊即有無二邊不立有無俱遣中道何安朝云凡夫著有不見有中之空二乘著空不見空中妙有不著見於二邊不取相於中道惟佛知見欲識無生處背境向心觀云何修行戒門所謂不殺不盜不淫不兩彼此舌不惡口不妄言不綺語文過飾非遠離貪嫉貪嗔癡欺詐十惡貪諂曲瞋嗔恚邪見癡防非止惡若出家者為折伏煩惱故要折伏煩惱亦應遠離憒閙常處寂靜修習少欲不多求知足生慚愧頭陀等行十二行此抖擻乃至小罪心生怖畏慚愧改悔不得輕於如來所制禁戒當護譏嫌不令衆生妄起過罪故戒有三謂律儀戒攝善法戒饒益有情戒所謂下是攝律儀遠離下是攝善法當護下是饒益有情言不殺者普該一切不獨於人不盜者一針一草不但五錢不淫者舉心即犯不唯觸身兩舌者搆扇兩家惡口者恣行咀螫妄言者無根之語綺語者粉飾之辭貪謂多求嫉謂妬忌諒其不知不見而謾之之謂欺諒其能知能見而探之之謂詐諂曲者足恭令色以媚人也瞋恚者奮怒發凶以惱人也邪見者不念真如而外求也少欲者不耽世味也知足者得少為足也頭陀者抖擻法塵也小罪生畏者防微杜漸也護譏嫌者謂行非律儀畜非法物皆招人譏謗即生他罪他罪所生實由於己故須護也問世間染法為所治出世淨法為能治則真俗互顯能所對治云何但説一心之旨能袪萬法答至道本乎一心心法本乎無住無住心體靈知不昧則萬物出生皆依無住一心為體離心之外無別有法如群波依水離水無波萬像依空離空無像故佛言我不見有異貪之法能出於貪瞋癡亦爾以離法界諸法無體故是故貪等法性得貪等名此説貪等法性能出貪等故頌云於貪起正思於貪得解脫故説貪出貪瞋癡亦復爾釋曰離貪之外無別有法以貪法界即一切法趣貪若於貪趣正思了貪無自性則於貪等得解脫若於貪起邪思迷貪生執著則於貪被繫縛繫縛解脫遂成真俗二門於真俗二門收盡一切染淨諸法貪法既爾瞋癡亦然一一遍含法界故若迷方便貪諸義門則是疑滔水以漂人望乾城而投足憑虗自失得實何憂此一心之旨萬德攸歸若善若惡皆能回轉若順若逆悉使善成所以十玄門中有唯心回轉善成門是故不得定説性中是淨不淨也故知逆順唯由心轉苦樂自逐緣分一念無住真心塵劫未曾改變但是隨智分別所見不同耳傅大士持戒頌曰尸羅得清淨無量劫來因妄想如怨賊貪愛若參辰參辰即參商二星一出一移常相遠離在欲而無欲居塵不染塵權依離垢地當證法王身佛為萬法之王云何修行忍門所謂應忍他人之惱如豬措金山心不懷報亦當忍於利衰毀譽稱譏苦樂等法故忍惱而不加報是耐冤忍忍八風者安受忍也利者戶外屨滿時衰者門前羅爵時毀者無過而加其惡譽者無德而加其善稱者實有德而揚之譏者實無德而刺之身心逼迫之謂苦身心安佚之謂樂遇此八種境界風來能安心不動者非大忍不能也黃庭堅云此八物無明種子也人從無明種子生連皮帶骨豈有可逃之地但以百年觀之則人與我及彼八物皆成一空古人云衆生身同太虗煩惱何處安腳細思熟念煩惱從何處來有益於事有益於身否八風之波渺然無涯而以百年有涯之生種種計校欲利惡衰怒毀喜譽求稱避譏厭苦逐樂不知得喪又自有宿因決不可計校而為之且猿騰馬躍至於澌盡而後休不可謂智也亦不知近道之塗亦窮於是懶菴居士云此八物無明種子也若能於話頭上得個著落則無明種子盡轉為般若真如矣既盡轉為般若真如則穿衣喫飯也是如是靜坐間眠也是如是設欲再覓無明種子杳不可得斯古佛所謂衆生身同太虗煩惱何處安腳者也不亦快哉傅大士忍辱頌云忍心如幻夢辱境若龜毛楞嚴經云見則同於龜毛兔角常能修此觀逢難轉堅牢無非亦無是無下亦無高欲滅貪瞋賊須行智慧刀云何修行進門所謂於諸善事心不懈退立志堅強遠離怯弱當念過去久遠已來虗受一切身心大苦無有利益是故應勤修諸功德自利利他遠離衆苦復次若人雖修行信心以從先世來多有重罪惡業障故為邪魔諸鬼之所惱亂或為世間事務種種牽纏或為病苦所惱有如是等衆多障礙是故應當勇猛精勤晝夜六時禮拜諸佛誠心懺悔勸請隨喜回向菩提常不休廢得免諸障善根增長故心不懈退者愈行而愈進也立志堅強者不以折挫而變其所守也遠離怯弱者不以畏難而止息半途也當念下思過去而勵今生也復次下為障重者設方便也欲除障而禮佛者如人負債依附於王人莫誰何也懺悔除惡業障勸請除謗法障隨喜除嫉妬障回向除三有障傅大士精進頌曰進修名𦦨地良為慧光舒二智心中遣三空境上袪無明念念滅高下執情除觀心如不間何啻至無餘二智真俗二智也云何修行止觀門所言止者謂止無境牽心一切境界相隨順奢摩他即止觀義故寂而常照清行所言觀者謂分別真如因緣生滅相隨順毗鉢舍那即觀觀義故云何隨順方便以此二義漸漸修習不相捨離止觀雙運雙現前故定慧雙顯忘塵息念之謂止謂不念世間一切諸法獨念唯心也分別生滅之謂觀謂觀察身受心法生從何來滅從何去也蕅益子云止則不隨妄想而一相永淨觀則不滯空寂而妙用恆興不相捨離者唯息念故能觀察唯觀察故能息念也雙現前故者惺寂雙流也照止名觀照觀名止若修止者住於靜處端坐正意不依氣息不依形色不依於空不依地水火風乃至不依見聞覺知一切諸想隨念皆除亦遣除想以一切法本來無想諸法念念不生念念不滅亦不得隨心外念境界後以心除心心若馳散即當攝來住於正念是正念者緣于真如實當知唯心無外境界即復此心亦無自相念念不相得若從坐起去來進止有所施作於一切時常念方便隨順觀察久習淳熟其心得住以心住故漸漸猛利隨順得入真如三昧深伏煩惱信心增長速成不退指前鈍根退者説唯除疑惑不信誹謗重罪業障我慢懈怠如是等人所不能入此是初心參禪工夫也端坐正意者身心俱正也不念一切名曰正念楞嚴云汝坐道場銷落諸念是也氣息者如調息數息或守氣導氣之類形者如循身骨璅或存想固形之類色者如修十遍處定或鉢頭日月等空者如三乘所修或無色所修等四大者如排併四大或事火事風等見聞覺知者如灰心斷識等已上皆是小乘外道所修禪故悉不依此以一心不動正念真如為禪即如來禪祖師禪也一切諸想隨念銷除者所謂淨裸裸赤灑酒十二時中不依倚一物是也亦遣除想者所謂有些氣息亦是病故須遣之又遣以一切法唯是真如本無有想亦無生滅故不容妄起一念也若有時不曾管帶倘有念起即便知覺所謂不怕念起只怕覺遲切不得隨心外念境界而後復以心除心若以心除心則展轉生心非歇心之法也心若馳散即當攝來住於正念者所謂一回入草去驀鼻拽將來也大安云安在溈山三十年吃溈山飯屙溈山屎不參溈山禪秪看一頭水牯牛若落路落草便把鼻孔拽轉來暫犯人苗稼即鞭撻調伏既久可憐生受人言語如今變作露地白牛在面前終日露逈逈地趂亦不去所以云置之一處即是諸佛道場此是初心做工夫最吃緊處是正念者當知唯心無外境界者不見心外有法方名正念若見有一法皆是邪思故曰內心不出外境不入心如墻壁可以入道昔法空禪師居五臺山每夜忽聞有聲名曰空禪法空患之久而自悟曰皆我自心之境安有外聲哉自後遂絶又靈潤法師山行野燒迅飛而來同遊者皆避之潤安步如常曰心外無火火實自心謂火可燒無由免火火至而滅又晉鳩摩羅什兒時隨母至沙勒頂戴佛鉢私念鉢形甚大何其輕耶即重失聲下之母問其故對曰我心有分別故鉢有輕重耳是知一切法隨念而至念未生時量同太虗然則即今現行分別者萬類紛然何故靈驗不等曰是皆虗妄亂想如因夢中事心力昧略微劣故也嗟乎人莫不有忠孝之心也而王祥臥冰則魚躍耿恭拜井則泉出何也蓋其養之專故靈驗之應速如影響此等皆是證唯心無外境界之樣子也即復此心亦無有相念念不可得者言心若馳散即住正念此心即復不必以心更除心也當知此心一復亦不見有心之自相可得自然安帖帖地已上是明靜時做工夫若從下復言動時做工夫謂於日用四威儀中一切處一切時隨順觀察不得忘却正念唯心話頭此是入真如門大方便故言隨順者如急水行船話頭不要走作也觀察者如貓捕鼠話頭不要放捨也日用尋常如此用功久久自然淳熟心不馳散常住正念住正念已心志自然漸漸猛利便能隨順得入真如三昧三昧即正定也既入此定分別不生煩惱自伏信心自長不待經一萬劫速成不退矣唯除下五種料揀不信者是闡提人誹謗者是壞教人重罪者作五逆罪是無間獄中人我慢者貢高自大不虗心的人懈怠者悠悠忽忽不努力的人此五等人皆不隨順故不得入故圓覺云唯除頓覺人併法不隨順復次依是三昧故則知法界一相謂一切諸佛法身與衆生身平等無二即名一行三昧當知真如是三昧根本若人修行漸漸能生無量三昧首楞嚴王具足萬行此云一行由一行故萬行由萬行故一行也文殊般若經云何名一行三昧佛言法界一相緣繫法界名一行三昧入是三昧者盡知恆沙諸佛法界無差別相以此真如三昧能生無量三昧故名三昧根本也密嚴偈云如飯一粒飯其餘皆可知諸法亦如是知一即知彼故知萬法共會斯宗猶如百花共成一蜜若諦了之一切皆我升沉去住任意隨緣語默卷舒常順一真之道治生産業不違實相之門運用施為念念未離法界行住坐臥步步常在其中如明達之士寓目開懷悉能先覺即未遇之人舉動施為未常間斷直如善財登閣龍女獻珠當此之時自然親見應須剋己辦事曉夜忘疲若問程而不行家鄉轉遠似見寶而不取還受貧窮故知於一念生死心中能信有諸佛不思議事者甚為難得傅大士頌曰如能發心者應當了二邊涅槃無有相菩提離所緣子榮曰如修行須發修菩薩行須求大乘正知見人悟達上乘先了有無二邊之執方證涅槃無相之理故離所緣之心境也無乘及乘者人法兩俱捐欲達真如理應識本源或有衆生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現端正男女等相當念唯心境界則滅終不為惱或現天像菩薩像亦作如來像相好具足若説陀羅尼若説布施持戒忍辱精進禪定智慧或説平等空無相無願無怨無親無因無果畢竟空寂是真涅槃或令人知宿命過去之事亦知未來之事得他心智辨才無礙能令衆生貪著世間名利之事又令使人數瞋數喜性無常準或多慈愛多睡多病其心懈怠或卒起精進復更休廢生於不信多疑多慮或捨本勝行更修雜業若著世事種種牽纏亦能使人得諸三昧少分相似皆是外道所得非真三昧或復令人若一日若二日若三日乃至七日住於定中得自然香美飲食身心適悅不飢不渴使人愛著或令人食無分齊乍多乍少顏色變異以是義故行者常應智慧觀察勿令此心墮於邪網當勤正念不取不著則能遠離是諸業障應知外道所有三昧皆不離見愛我慢之心貪著世間名利恭敬故前明佛境此明魔境要知佛魔皆是自心現量不從外來現形恐怖者可畏相也端正男女者可愛相也當念唯心境界則滅者是却魔之法也古德云山鬼伎倆有盡老僧不采無窮是也若一念心動便為彼播弄矣昔有禪師在山坐見一孝子擎一死尸來向禪師前著便哭云何故殺我阿母禪師知是魔思曰此是魔境我將斧斫却可得解脫便取斧斫孝子孝子走去後覺股上濕便看乃是血不期自斫又有一禪師坐時見一豬來在前禪師知是魔則把豬鼻孔拽唱叫把火來火至乃見禪師自把鼻唱叫此乃正坐禪時心中起見遂感外魔入心故知若了唯心諸境自滅何處心外別有魔境耶或現下隨所好而現身也若説下隨所好而説法也好總持者説總持好六度者説六度好平等者説平等好解脫者説三解脫好宿命者現宿命好心通者現心通好名利者談名利一入人心如油入麵能令行人數瞋數喜改常易度或多慈愛者見人則愛也睡病懈怠者不耐修行也忽起忽滅者鋭始怠終也生於不信者始乎信而卒之以疑慮也捨勝行而修雜業者下喬木而入幽谷也所謂性無常準如此少分相似者倣佛不真影像三昧也令人得定者魔力所持也顏色變異者眩人眼目也魔事雖多若以上智觀察即念唯心不生取著自然消滅若起著心落他倦繢故楞嚴經云不作聖心名善境界若作聖解即受群邪應知下總結魔外三昧不真以外道三昧不從真如流出故皆是從見思二惑我法二執中生無非貪著名利恭敬故當知為名利而妄説修行要恭敬而假粧摸樣口口談空心心著有者皆魔事也可不慎乎傅大士頌曰依他一念起俱為妄所行便分六十三九百亂縱橫法華經云薄德少福人衆苦所逼迫入邪見稠林若有若無等依止此諸見具足六十二毗婆沙論云六十二見者五蘊中各起則見四五二十三世各二十通為六十通身即是神身與神二見總為六十二見曰於色蘊中即色是我離色非我我中有色色中有我五蘊中具有此四過去滅無滅當來生不生常能作此觀真妄坦然平真如三昧者不住見相不住得相乃至出定亦無懈慢所有煩惱漸漸微薄若諸凡夫不習此三昧法得入如來種性無有是處以修世間諸禪三昧多起味著依於我見繫屬三界與外道共若離善知識所護則起外道見故上言似三昧此言真三昧也雖在定中不見有定相者無分別故不見有得相者無愛著故所有煩惱漸漸微薄者得定之效驗也乃至出定不生懈慢者正謂不以在定而精進出定而怠弛也不以在定而心敬出定而心慢也反顯用心專一不在定不定也若諸下結顯修行真三昧者方具正因入如來種以修下結顯修似三昧必落魔外也世間三昧如四禪八定及無想定等由彼未空我執味著定境有見有得故智者頌曰非到真如理棄我入無為衆生及壽者悟見總皆非若悟菩提道彼岸更求離法相與非相了應如是知復次精勤專心修學此三昧者現世當得十種利益云何為十一者常為十方諸佛修真如即修十方佛之心菩薩之所護念二者不為諸魔惡鬼所能恐怖三者不為九十五種外道鬼神之所惑亂四者遠離誹謗甚深之法重罪業障漸漸微薄五者滅一切疑諸惡覺觀六者於諸如來境界信得增長七者遠離憂悔於生死中勇猛不怯八者其志柔和捨於憍慢不為他人所惱九者雖未得定於一切時一切境界處則能減損煩惱不樂世間十者若得三昧不為外緣一切音聲之所驚動此顯修真三昧現世獲益也諸佛菩薩所護念者是正法眼藏故魔鬼不能恐者中心樹子不動故外道不能惑者有定盤星知斥識兩故遠離誹謗者深信真如無謗法之愆故滅一切疑者已得正信疑無所生故信得增長者始而信既而解行終而證入故生死不怯者已具金剛寶覺故捨憍慢者知平等法無有二故損減煩惱不樂世間者世味淡薄道心濃厚故音聲不驚動者內心不出外境不入故傅大士頌曰信根生一念諸佛盡能知生因於此日證果未來時三大經多劫六度久安施熏成無漏種方號不思議復次若人唯修於止則心沉沒或起懈怠不樂衆善遠離大悲是故修觀修習觀者當觀一切世間有為之法無得久停須臾變壞一切心行念念生滅以是故苦應觀過去所念諸法恍惚如夢應觀現在所念諸法猶如電光應觀未來所念諸法猶如於雲歘爾而起應觀世間一切有身悉皆不淨種種穢污無一有可樂如是當念一切衆生從無始時來皆因無明所熏習故令心生滅已受一切身心大苦現在即有無量逼迫未來所苦亦無分齊難捨難離而不覺知衆生如是甚為可愍作是思惟即應勇猛立大誓願願令我心離分別故遍於十方修行一切諸善功德盡其未來以無量方便救拔一切苦惱衆生令得涅槃第一義樂以起如是願故於一切時一切處所有衆善隨己堪能不捨修學心無懈怠唯除坐時專念於止若餘一切悉當觀察應作不應作若行若住若臥若起皆應止觀俱行所謂雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞雖念因緣善惡業報而亦即念性不可得此言修觀也若修於止則心沉沒者耽著靜境不肯放捨古人喻之枯樁死水是也或起懈怠者但念空無相無作也不樂衆善者不求佛道也遠離大悲者不樂度生也所謂夜明簾外轉身難故當修觀治之也修習下此令行人總觀世間有為不久心行不常衆生貪著不覺不知以故受苦也應觀過去等觀法無我也應觀世間等觀身不淨也如是下觀心無常也已受下觀受是苦也衆生下念衆生苦發大悲心也作是下發自利利他二種大願也以起下修集一切善法也唯除下謂靜時唯專念止餘一切動時皆應止觀俱行所謂一心不動入諸禪了境無生名般若正如車之兩輪鳥之雙翼缺一不可也所謂下正明止觀雙行淨名云無我無邊無受者善惡之業亦不忘是也故宗鏡云為法國土之王因茲二力出生死海之底全假雙修散妄亂而似風吹雲破愚暗而如日照世動邪見之深刺拔無明之厚根為大覺海之陰陽作寶花王之父母傋一乘之基地堅萬行之垣墻以此相應能入宗鏡傅大士頌曰如星翳燈幻皆為喻無常王日休云如星者謂暗時則現明時則無喻衆生愚暗故有有為法若明悟則無也如翳者謂衆生自有光明於內乃為有為法所蔽如翳障目也如燈者謂暗時則用明時則不用喻衆生愚暗故用有為法明悟則不用也如幻者謂有為法非真實也漏識修因果誰言得久長危脆同泡露如雲影電光饒經八萬劫終是落空亡智者大師圓成頌曰相寂名亦遣心融境亦亡去來終莫見語默永無方智入圓成理身同法性常證真還了俗不廢示津梁傅大士禪定止門頌曰禪河隨浪靜定水逐波清澄神生覺性息慮滅迷情遍計虗分別由來假立名若了依他起無別有圓成又智慧觀門煩曰慧燈如朗日蘊界若乾城子榮云乾城者即乾達婆城海上龍蜃化現餘氣人見樓閣忽爾還無此破衆生妄執五蘊色身為實明來暗便謝無暇暫時停妄心猶未滅乃見我人形妙智圓光照唯得一空名若修止者對治凡夫住著世間能捨二乘怯弱之見若修觀者對治二乘不起大悲愜劣心過遠離凡夫不修善根以是義故是止觀門共相助成不相捨離若止觀不具則無能入菩提之道此明止觀功用各有對治也凡夫耽著世間不能放捨二乘不達無生怖畏生死故令修止以治之二乘非觀不發大悲凡夫非觀不發善根故令修觀以治之所謂觀空而萬行沸騰涉有而一道清淨以是下結上行人定當止觀雙行共相助成必不相離若二門不具無能入道智者大師頌曰三大僧祇劫萬行具齊修既悟無人我長依聖道流二空方漸證人我二空觀也三昧任遨遊梵語三昧此云正定止也創居歡喜地常樂遂無憂復次衆生初學是法欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道如修多羅説若人專念西方極樂凡聖同居世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生住正定慧故已説修行信心分已上開五種門令人專心自信本來是佛直下承當復修諸行以磨鍊之此下又為求入正信而心怯弱者別開念佛法門也諸佛難值一畏也信心難生二畏也心存二畏意欲退墮人天二乘故別開方便令彼念佛一以攝護信心令得成就一以隨願往生令得見佛言專意者淨念相繼一心不亂也念佛因緣者佛是正因念是助緣因緣和合方得見佛故由佛身無處不在但意不專念不切不易得見故觀無量壽佛經云諸佛如來是法界身入一切衆生心想中是故心想佛時是心即具三十二相八十種好是心作佛是心是佛諸佛正遍知海從心想生楞嚴經云若衆生心憶佛念佛現前當來必定見佛既見佛已決定不退信心故若觀下此即是觀察念佛者誰與能觀無念者同途異轍畢竟得生住正定故者如入楞伽經云大慧汝當知善逝滅度後南天竺國中大名德比丘厥號為龍樹能破有無宗世間中顯我無上大乘法得初歡喜地往生安樂國故知參禪念佛皆是捷徑法門能專意念佛者必如能決志參禪念佛而意不專參禪而志不決其欲往生淨土見性成佛者難矣哉淨土十疑論問云諸法體空本來無生平等寂滅今乃捨此求彼豈不乖理經云淨土先淨其心心淨即佛土淨此云何通答一總答若言求生西方是捨此求彼不中理者汝執住此不求生西方是捨彼著此此還成病不中理也又轉計亦不求生彼亦不求生此者則斷滅見二別答夫不生不滅者於生緣中諸法和合不守自性求於生體亦不可得此生生時無所從來故名不生諸法散時不守自性言我散滅此散滅時去無所至故言不滅非謂因緣生外別有不生不滅亦非不求生淨土喚作無生中論云因緣所生法我説即是空亦名為假名亦名中道義又諸法不自生亦不從他生不共不無因是故知無生維摩經云雖知諸佛國及與衆生空而常修淨土教化諸群生智者熾然求生淨土達生體不可得即真無生此謂心淨即佛土淨愚者為生所縛聞生即作生解聞無生即作無生解不知生即無生無生即生不達此理橫相是非瞋他求生淨土幾許誣哉此是謗法罪人邪見外道也故淨土或問云參禪人最好念佛根機或鈍恐今生未能大悟且假彌陀願力接引往生又云汝若念佛不生淨土老僧當墮拔舌地獄真歇了禪師淨土説云洞下一宗皆悟密修其故何哉良以念佛法門徑路修行正按大藏接上上器傍引中下之機又云乃佛乃祖在教在禪皆修淨業同歸一源入得此門無量法門悉皆證入至如天衣懷圓照本慈受深南嶽思法照淨靄大通懷玉道珍法真守納北澗簡天目禮等諸大長老皆是禪門宗匠其密修顯化發揚淨土之旨不約而同豈特諸老為然嘗聞老宿曰合五家宗派盡天下禪僧悟與未悟無一不歸淨土百丈海禪師馬祖的子天下叢林從古至今無一事敢違其法看他為病僧念誦舉揚一偈稱讚彌陀復同聲念佛百千聲回向云諸緣未盡早遂輕安大命難逃徑皈安養又津送亡僧云神超淨域業謝塵勞蓮開上品之花佛授一生之記荼毗之際引聲高唱阿彌陀佛十唱十和贊助往生此非淨土之指歸乎百丈以來皆依此法然則禪僧無不歸淨土者豈不然乎是以東土西域無不以此為究竟指歸也論主將此一章著於修行信心分之末亦深有意非強安排也抱疑之徒可信斯旨次説勸修利益分此分勸人進修必獲大利如是摩訶衍諸佛祕藏我已總説若有衆生欲於如來甚深境界得生正信遠離誹謗入大乘道當持此論思量修習究竟能至無上之道若人聞是法已不生怯弱當知此人定紹佛種因中必為諸佛之所授記如是下總結前文若有下此勸參禪得益也持者不放捨也思量者極力究竟也修習者念念熏習也究竟至無上道者獲益也若聞而勇往直前不生怯弱此人理觀分明乘戒俱急如此則一生可辦定紹佛種故云一句染神必當作佛一字經耳七世不沉昔泥蛤聽法而生天廄象聞經而悛惡比丘戲笑而獲果女人思惟而悟空何況聞此一心大解脫法門哉釋摩訶衍論云第一顯離疑生信入功德門者謂有衆生聞此摩訶衍甚深極妙廣大法門已即其心中亦不疑畏亦不怯弱亦不輕賤亦不誹謗發決定心堅固心尊重心愛敬心當知是人真實佛子不斷佛種不斷法種不斷僧種常恆相續展轉增長盡於未來亦為諸佛親所授記亦為一切無量菩薩之所護念故假使有人能化三千大千世界滿中衆生令行十善不如有人於一食頃正思此法過前功德不可為喻此言比類對治示勝門也謂若有人能攝化三千大千世界中遍滿衆生皆悉無餘令行十善或有衆生於一食頃於此甚深觀察思量若校量此二人功德彼第一人功德極甚微少譬如芥子碎作百分之量此第二人甚極廣大譬如碎十方世界微塵數量故然人烏得能化三千世界蓋假喻耳乃極言其不可以比也復次若人受持此論觀察修行若一日一夜所有功德無量無邊不可得説假令十方一切諸佛各於無量無邊阿僧祇劫説其功德亦不能盡何以故謂法性功德無有盡故此人功德亦復如是無有邊際此言受持功德讚揚門也受者直下承受持者時時行持也謂若有人受持此論觀察義理如實修行若一日若一夜中間所得功德無量無邊不可言説不可思量何以故一切文字攝在自心觀察中故得之者不在於年月之多但一念頃即入實諦而其性天昭徹矣若更有勤行精進受之不忘於心持之不厭其久説之普得聞知非特覺一己之性且將覺億萬人之性其為功德莫大焉烏可思量而言説乎假使十方三世一切諸佛一切菩薩以十方世界微塵數舌各各皆悉於十方世界微塵數量不可説劫讚揚其人所有功德亦不能盡以法身真如功德等虗空界無邊際故一日一夜所得功德尚不可思議何況二日若三日以至無數日受持讀誦思惟觀察如實修行是不可思議中不可思議者乎故知信此真宗必以拳拳服膺而修行之方能與真如相應而出世也若以到處高談闊論能説能書外則誑惑世人內則自欺己德但取名聞利養而博學甘心自暴自棄而不行若如是明理者名為法門中賊違背法性常取三惡道故何有無量無邊功德而十方諸佛讚歎也十方諸佛所歎其功德者讚其受持此論觀察義理如實修行也故知信此真宗成摩訶衍三世諸佛之所證義理何窮十方菩薩之所乘功德無盡可謂甘露入頂醍醐灌心耀不二之慧燈破情根之暗惑注一味之智水洗意地之妄塵能令厚障深遮若暴風之卷危葉繁疑積滯猶赫日之爍輕冰猶如於諸王中為金輪之王於諸照中為晨旭之照於諸寶中為摩尼之寶於諸華中為青蓮之華於諸諦中為真空之門於諸法中為涅槃之宅故遇斯教者應須自慶其有衆生於此論中毀謗不信所獲罪根經無量劫受大苦惱是故衆生但應仰信不應毀謗以深自害亦害他人斷絶一切三寶之種以一切如來皆依此法得涅槃故一切菩薩因之修行得入佛智故當知過去菩薩已依此法得成淨信現在菩薩今依此法得成淨信未來菩薩當依此法得成淨信是故衆生應勤修學先言毀謗獲罪是故下結勸應信以深下出謗毀獲罪之所以當知下結勸修行獲益之所以諸佛甚深廣大義我今隨順總持説回此功德如法性普利一切衆生界初句結義次句結文三四二句回向衆生浙江紹興府山陰縣福勝菴比丘源洪潤寓于杭城天長寺謹抄時在嘉慶三年四月十二日禁筆記
