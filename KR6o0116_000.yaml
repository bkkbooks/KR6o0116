front:
  text: 大乘起信論續疏自序大雄氏現相人中雖説無量法門若統其歸趣唯是一心若滙其流派則有三宗曰法相曰破相曰法性而已言法相者謂依生滅八識建五位開百法立三性分二我行必資於漸滿惑必期乎漸斷果必立乎三祇故有六度可修有無明可克有菩提可證其于教也為漸此法相之大旨也言破相者謂依寂滅一心直顯真性不説法相一切所有唯是妄想一切法界唯是絶言五法三自性俱空八識二無我悉遣訶教勸離毀相泯心生心即妄不生即佛無六度可修無無明可克無菩提可證其于教也無頓此破相之大旨也若夫法性者統依寂滅一心而有六粗三細故開真如門以顯空諸所有立生滅門以明實諸所無雖真如廓爾而果報不失雖惑業紛綸而法性不動即性即相即空即有即妄即真其于教也為頓悟漸修此法性之大旨也故宗法相者謂真如不變不許隨緣但説萬法皆從識變而事事俱有其斃也流而為常為執著宗破相者謂緣生之法不入法性故説三界唯是一心而法法皆空其斃也流而為斷為莽蕩宗法性者謂真如不變隨緣而能成一切法故無法法俱空之斃由真如隨緣不變而能泯一切法故無事事俱有之偏此則空有迭彰執蕩雙遣故知即萬法以顯有者為妙有離萬法以顯空者為真空不即不離以顯中者即真空以顯妙有故雖空而不空即妙有以顯真空故雖有而不有然前之二宗雖建立不同各有妙旨而馬鳴總以一心九識統之若鼎之三足伊之三點不縱不橫不離不即實與楞嚴一心三觀之旨並行不悖此馬鳴一論尤為圓通無礙獨出無對者也是論之作菩薩有釋賢首有疏永明主此論而作宗鏡故集宗鏡中互相發明者作續疏言續疏者是續賢首之疏以顯不外賢首亦不盡賢首也其中以有法立總別三量為一論提綱智者即量以通論則不唯了法性一宗併可了法相破相二宗也已大乘起信論主馬鳴菩薩略傳馬鳴大士者波羅奈國人也昔為毗舍利國王以其國有一類裸人如馬裸露王遂運神通分身為蠶以衣之後生中印土馬人感戀悲鳴故號馬鳴亦名功勝以有作無作諸功德最為殊勝故名焉時十一祖富那夜奢尊者至其國有一長者來趣法會祖謂衆曰汝等識此來者耶佛記聖者馬鳴紹吾法者也於是馬鳴致禮問曰我欲識佛何者即是祖曰汝欲識佛不識者是彼曰佛既不識焉知是乎祖曰既不識佛焉知不是曰此是鋸義祖曰彼是木義祖問鋸義者何曰與師平出鳴却問木義者何祖曰汝被我解馬鳴豁然省悟遂求剃度祖謂衆曰如來懸記滅度後六百年馬鳴當於波羅奈國摧伏外道度人無量遂得付法後於華氏國轉妙法輪顯諸神力降伏魔事時有外道索師論義集王大臣及四衆俱會論場師曰汝義以何為宗曰凡有言説我皆能破師乃指國王曰當今國王康寧大王長壽請汝破之外道屈服後造甘蔗論十萬偈復集百部大乘經義以造斯論可謂于羣藥中但取阿陀之妙向衆寶內唯探如意之珠舉一蔽諸以本攝末矣大乘起信論主馬鳴大士略傳終詳在大士本傳
